id: 153
title: Two Sum Indices
category: warmup
difficulty: Easy
summary: Return the indices of the two numbers that add up to a target.
description: Implement two_sum(nums, target) that returns a list [i, j] (i < j) where nums[i] + nums[j] == target. You may assume exactly one solution exists.
scenario: |-
  A budget-tracking app allows users to find two specific expense entries that together hit a savings milestone. The backend receives the full list of expense amounts and the target total, then returns the positions of the two matching entries so the UI can highlight them. The function runs on every milestone-check event triggered by the user.
alt_scenarios:
  - "**Test case generator:** A combinatorics tool finds which two elements in a generated array sum to a known value to verify test fixture correctness."
  - "**Bin packing pre-check:** A packaging optimizer quickly checks whether any two item weights in a batch exactly fill a container to its weight limit."
constraints:
  - Exactly one solution exists. Each element may only be used once.
examples:
  - input: two_sum([2, 7, 11, 15], 9)
    output: '[0, 1]'
starter_code: |-
  def two_sum(nums: list[int], target: int) -> list[int]:
      pass
follow_ups:
  - Return all pairs if multiple solutions exist.
  - What if the list is sorted — can you do it with two pointers?
key_skills:
  - arrays
  - hash maps
test_type: function
function_name: two_sum
test_cases:
  - label: basic
    input:
      nums: [2, 7, 11, 15]
      target: 9
    expected: [0, 1]
  - label: not at start
    input:
      nums: [3, 2, 4]
      target: 6
    expected: [1, 2]
  - label: adjacent
    input:
      nums: [1, 5, 3, 7]
      target: 8
    expected: [1, 3]
explanation: |-
  This warm-up is meant to build confidence around **hash maps** with a very small surface area.

  Use a dictionary mapping each value to its index. For each element, check if target - element is already in the map. This gives O(n) time and O(n) space.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
  - 'complement = target - nums[i]; if complement in seen: return [seen[complement], i]'
  - The hash map approach processes each element once, avoiding the O(n²) brute force.
  - 'Treat Two Sum Indices as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
