          pass

      def delete(self, key: str) -> int:
          pass

      def get(self, key: str):
          pass

      def get_at(self, key: str, version: int):
          pass

      def rollback(self, version: int) -> None:
          pass
follow_ups:
- Optimize memory so rollback doesn't duplicate the entire state.
- Add a diff(v1, v2) method that returns what changed between two versions.
- What if you need to support branching, like git?
key_skills:
- persistent data structures
- copy-on-write
- hash map
- versioning
