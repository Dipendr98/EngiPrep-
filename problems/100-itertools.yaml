id: 100
title: "itertools: Combinations"
category: syntax
difficulty: Medium
summary: Use itertools.combinations to find all unique pairs from a list of distinct integers that sum to a target.
description: >-
  Implement `unique_pairs_sum(nums: list[int], target: int) -> list[list[int]]` that
  takes a list of distinct integers and a target, and returns all unique pairs (as sorted
  [a, b] lists) that sum to the target. Use itertools.combinations. Return the pairs
  sorted by first element.
scenario: >-
  A portfolio optimizer finds all pairs of asset IDs whose combined return score
  matches a target allocation value, using combinations to enumerate candidate pairs.
constraints:
  - All integers in nums are distinct
  - Return pairs as [a, b] with a <= b, sorted by first element
  - Return an empty list if no pairs exist
examples:
  - input: unique_pairs_sum([1,2,3,4,5], 5)
    output: '[[1, 4], [2, 3]]'
starter_code: |-
  def unique_pairs_sum(nums: list[int], target: int) -> list[list[int]]:
      pass
follow_ups:
  - How would you extend this to find all triplets (3-combinations) that sum to target?
  - What is the time complexity of the combinations approach vs a two-pointer approach?
key_skills:
  - itertools
  - combinations
  - filtering
  - sorting
test_type: function
function_name: unique_pairs_sum
test_cases:
  - label: two pairs found
    input:
      nums: [1, 2, 3, 4, 5]
      target: 5
    expected: [[1, 4], [2, 3]]
  - label: no pairs found
    input:
      nums: [1, 2, 3, 4, 5]
      target: 10
    expected: []
  - label: negative numbers included
    input:
      nums: [-1, 0, 1, 2]
      target: 1
    expected: [[-1, 2], [0, 1]]
  - label: unsorted input distinct values
    input:
      nums: [1, 5, 3, 2, 4]
      target: 6
    expected: [[1, 5], [2, 4]]
explanation: |-
  `itertools.combinations(iterable, r)` yields all r-length subsequences without
  repetition in lexicographic order. It's perfect for "find all pairs/triples that
  satisfy a condition" problems. While a hash-based approach is O(n) vs O(n²) for
  combinations, knowing itertools is valuable for quick prototyping and for problems
  where combinations are explicitly required (e.g., generating test cases, combinatorial
  search).
references:
  - "Python docs: itertools.combinations — https://docs.python.org/3/library/itertools.html#itertools.combinations"
  - "Python docs: itertools — https://docs.python.org/3/library/itertools.html"
