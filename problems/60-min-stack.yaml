id: 60
title: Min Stack
category: stateful
difficulty: Easy
summary: Support push, pop, top, and retrieving the current minimum in constant time.
description: Implement MinStack with push(val), pop(), top(), and get_min(), each in O(1).
scenario: An interview tool wants an example of keeping derived state updated incrementally instead of rescanning a full collection on every query.
constraints:
- All operations are valid
- get_min returns the smallest element currently in the stack
examples:
- input: |-
    s = MinStack()
    s.push(-2)
    s.push(0)
    s.push(-3)
    s.get_min()
  output: '-3'
starter_code: |-
  class MinStack:
      def __init__(self):
          pass

      def push(self, val: int) -> None:
          pass

      def pop(self) -> None:
          pass

      def top(self) -> int:
          pass

      def get_min(self) -> int:
          pass
follow_ups:
