  expected: 0
function_name: num_islands
explanation: |-
  For each unvisited '1' cell, increment the island count and run a DFS/BFS to sink the whole island (mark all connected '1's as '0' or visited).

  DFS approach: when you find a '1', call dfs(r, c) which marks (r,c) as '0' and recursively calls itself on the four neighbors if they are in bounds and equal '1'.

  BFS approach: use a queue, enqueue the starting cell, then process neighbors the same way.

  In-place modification is fine when the grid is a local copy; use a visited set if you must preserve the input.

  Time O(rows * cols), space O(rows * cols) for the recursion stack or BFS queue in the worst case.
references:
- Sinking cells in-place is the most concise approach — mark as '0' immediately when enqueuing to avoid revisiting.
- This is the classic "connected components" problem on an implicit graph — the edges are the 4-directional adjacencies.
