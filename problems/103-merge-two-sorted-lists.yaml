function_name: merge_sorted_lists
explanation: |-
  The dummy head pattern eliminates special-casing the first node. Create a sentinel node; keep a tail pointer on it. At each step compare l1.val vs l2.val, attach the smaller node to tail, advance both tail and the chosen pointer.

  After the loop, one list may still have remaining nodes — append the non-None remainder directly (no need to iterate).

  Time O(m + n), space O(1) — only the dummy node is allocated and it is not returned.

  The recursive version is clean but risks stack overflow on very long lists.
references:
- The dummy head (sentinel) pattern avoids conditional logic for the first node — use it whenever building a new list from pieces.
- After the main loop, one list still has nodes — attach the whole tail rather than iterating.
