id: 37
title: Streaming Line Reader
category: infra
difficulty: Medium
summary: Buffered reader that yields complete lines from chunked byte input.
description: Implement a streaming reader that receives arbitrary byte chunks via feed(chunk) and yields complete lines as they become available. Lines are delimited by newline characters. Partial lines are buffered until the next chunk completes them. Support a max_line_length to prevent memory issues.
scenario: You're building a log tail feature that reads from a network socket. Data arrives in arbitrary-sized chunks — sometimes half a line, sometimes three lines jammed together. You need a component that buffers incoming data and emits complete lines as soon as they're available, while protecting against a malicious or misconfigured sender that never sends a newline and would otherwise eat all your memory.
constraints:
- Lines are delimited by '\n' (newline character)
- Chunks are Python strings
- max_line_length is a positive integer; exceeding it raises a LineTooLongError
- feed() returns a list of complete lines without the trailing newline
- flush() returns any remaining buffered content as a single-element list, or [] if empty
- Empty lines (consecutive newlines) are valid and should be yielded as empty strings
examples:
- input: |-
    reader = StreamingLineReader(max_line_length=1024)
    reader.feed('hello wo')
  output: '[]  # partial line, no newline yet — buffered internally'
- input: reader.feed('rld\nfoo\nba')
  output: '[''hello world'', ''foo'']  # two complete lines emitted; ''ba'' is buffered'
- input: reader.flush()
  output: '[''ba'']  # remaining buffer returned as a final line'
