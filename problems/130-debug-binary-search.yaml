function_name: binary_search
explanation: |-
  The three bugs:

  **Bug 1 — Initial right value**: `right = len(nums)` should be `right = len(nums) - 1`. Using len causes an index-out-of-bounds when accessing nums[mid] on a full-range search.

  **Bug 2 — Loop condition**: `while left < right` should be `while left <= right`. With `<`, a single-element subarray (left == right) is never checked.

  **Bug 3 — Boundary updates**:
  - `left = mid` should be `left = mid + 1`. Without +1, if target > nums[mid] and the subarray is two elements, left never advances → infinite loop.
  - `right = mid + 1` should be `right = mid - 1`. Without -1, we overshoot and re-check cells already ruled out.

  Fixed version:
  ```python
  left, right = 0, len(nums) - 1
  while left <= right:
      mid = left + (right - left) // 2
      if nums[mid] == target: return mid
      elif nums[mid] < target: left = mid + 1
      else: right = mid - 1
  return -1
  ```

  The invariant: at the start of every iteration, target (if present) is within [left, right]. Each boundary update maintains this by excluding the ruled-out mid.
references:
- Memorize the fixed loop invariant — left <= right, left = mid+1, right = mid-1 — and never deviate.
- The off-by-one family of binary search bugs is one of the most common sources of interview bugs.
