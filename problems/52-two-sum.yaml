id: 52
title: Two Sum
category: search
difficulty: Easy
summary: Find the two indices whose values add up to a target.
description: Implement two_sum(nums, target) that returns the indices of two distinct elements whose sum equals target. Return the pair in ascending index order.
scenario: A product analytics job needs to quickly match two event counts that combine to a known threshold, and the caller only needs the original positions.
constraints:
- Exactly one valid answer exists
- Do not reuse the same element twice
examples:
- input: two_sum([2, 7, 11, 15], 9)
  output: '[0, 1]'
- input: two_sum([3, 2, 4], 6)
  output: '[1, 2]'
starter_code: |-
  def two_sum(nums: list[int], target: int) -> list[int]:
      pass
follow_ups:
- Return all unique index pairs.
- Handle inputs too large to fit in memory.
key_skills:
- hash map
- search
test_type: function
function_name: two_sum
test_cases:
- label: basic case
  input:
    nums:
    - 2
    - 7
    - 11
    - 15
    target: 9
  expected:
  - 0
  - 1
- label: middle pair
  input:
    nums:
    - 3
