id: 15
title: Course Schedule Builder
category: scheduling
difficulty: Medium
summary: Find a valid course order respecting prerequisites, or report impossible.
description: Given N courses numbered 0 to N-1 and prerequisite pairs [course, prereq], determine if all courses can be completed. If yes, return a valid ordering. If there's a cycle, return which courses are involved in the deadlock.
scenario: ''
constraints: []
examples: []
starter_code: |-
  def build_course_schedule(num_courses: int, prerequisites: list[list[int]]) -> dict:
      pass
follow_ups:
- Determine the minimum number of semesters to complete all courses if you can take K courses per semester.
- Handle optional prerequisites (soft dependencies).
- Add time estimates and find the critical path.
key_skills:
- topological sort
- BFS/DFS
- cycle detection
- directed graph
test_type: function
test_cases:
- label: valid schedule
  input:
    num_courses: 4
    prerequisites:
    - - 1
      - 0
    - - 2
      - 0
    - - 3
      - 1
    - - 3
      - 2
  expected:
    can_finish: true
    order:
    - 0
    - 1
    - 2
    - 3
    cycle: []
- label: cycle
  input:
    num_courses: 2
    prerequisites:
    - - 0
      - 1
    - - 1
      - 0
  expected:
    can_finish: false
    order: []
    cycle:
    - 0
    - 1
function_name: build_course_schedule
explanation: |-
  This problem is mainly about choosing a clean invariant around **topological sort** and then preserving it on every operation.

  A strong solution starts by deciding what state to keep in memory, how each public operation updates that state, and what the time complexity should be in the common case.

  The usual tradeoff here is how **BFS/DFS** supports the fast path without making updates or edge cases harder to reason about.

  When studying it, write down the data structure layout first, then walk through the smallest tricky example by hand: duplicate updates, missing keys, empty input, or a boundary timestamp/index.

  A polished interview answer should also call out complexity, edge cases, and the invariant that proves the implementation stays correct after each step.
references:
- Know both Kahn’s algorithm and DFS-based cycle detection so you can choose the clearer tool.
- Practice spotting cycles in graphs, linked structures, and recursive references.
- Model which item should be processed next and which data structure answers that question most directly.
- Keep one eye on tie-breaking rules so your output stays deterministic.
