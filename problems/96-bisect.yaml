id: 96
title: "bisect: Sorted Insert"
category: syntax
difficulty: Easy
summary: Use bisect.insort to insert a value into a sorted list at the correct position without re-sorting.
description: >-
  Implement `sorted_insert(lst: list[int], val: int) -> list[int]` that takes a sorted
  list and a value, and returns a new sorted list with the value inserted at the correct
  position. Use bisect. Do not sort the whole list.
scenario: |-
  A gaming backend team at a mobile studio maintains a live leaderboard that accepts new score submissions at a rate of thousands per minute during peak play sessions. Re-sorting the entire list on each insertion would be prohibitively expensive at this volume, so the engineer implements an incremental sorted insert using bisect to find the correct position in O(log n) and shift only the affected elements. The sorted invariant must be preserved across every insertion to ensure rank reads are always correct.
alt_scenarios:
  - "**Time-series database:** A metrics store inserts incoming timestamped data points into a sorted index buffer using bisect to maintain chronological order without full re-indexing."
  - "**Order book:** A trading exchange inserts new limit orders into a sorted price-level list using bisect to place them at the correct price priority without re-sorting."
  - "**Event scheduler:** A task runner uses bisect to insert new scheduled jobs into a sorted execution queue ordered by trigger timestamp."
constraints:
  - lst is sorted in ascending order
  - lst may be empty
  - val may already exist in lst (duplicates are allowed)
  - Do not modify the original list
examples:
  - input: sorted_insert([1,3,5,7], 4)
    output: '[1, 3, 4, 5, 7]'
starter_code: |-
  def sorted_insert(lst: list[int], val: int) -> list[int]:
      pass
follow_ups:
  - How would you use bisect_left vs bisect_right to control where duplicates are inserted?
  - How would you count how many elements are strictly less than val?
key_skills:
  - bisect
  - binary search
  - insort
  - sorted data structures
test_type: function
function_name: sorted_insert
test_cases:
  - label: insert in middle
    input:
      lst: [1, 3, 5, 7]
      val: 4
    expected: [1, 3, 4, 5, 7]
  - label: insert at beginning
    input:
      lst: [1, 2, 3]
      val: 0
    expected: [0, 1, 2, 3]
  - label: insert at end
    input:
      lst: [1, 2, 3]
      val: 5
    expected: [1, 2, 3, 5]
  - label: insert duplicate value
    input:
      lst: [2, 4, 6]
      val: 4
    expected: [2, 4, 4, 6]
explanation: |-
  `bisect.insort(lst, val)` inserts val into a sorted list in the correct position using
  binary search — O(log n) to find the index but O(n) to shift elements. `bisect.bisect_left(lst, val)`
  just returns the insertion index without modifying the list, which is useful for
  "how many elements are less than X" queries. This is the idiomatic way to maintain a
  sorted list incrementally.
references:
  - "Python docs: bisect — https://docs.python.org/3/library/bisect.html"
  - "bisect.insort() — https://docs.python.org/3/library/bisect.html#bisect.insort"
