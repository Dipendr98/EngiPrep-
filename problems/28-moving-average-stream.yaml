id: 28
title: Moving Average Stream
category: streaming
difficulty: Easy
summary: Compute a moving average over a sliding window of values.
description: Implement a class that computes the moving average of the last N values in a stream. add(value) adds a new value and returns the current average. The window size N is set at initialization.
scenario: |-
  You're on the Observability Platform team at a SaaS company, building the metrics pipeline that powers the on-call dashboard. Every HTTP response emits its latency in microseconds to a stream processor, and the dashboard widget labeled "P50-ish avg (last 100 requests)" needs to update on each new data point. With hundreds of services each emitting thousands of requests per minute, the computation must be O(1) per event—re-scanning the window on every sample would make the pipeline a bottleneck. You're implementing the moving average primitive that every service-level dashboard widget will use under the hood.
alt_scenarios:
  - "**Algorithmic trading system:** Computing a short-window exponential moving average of bid-ask spreads tick-by-tick so a market-making algorithm can detect when the spread widens beyond a threshold."
  - "**IoT sensor platform:** Smoothing noisy temperature or vibration readings from factory-floor sensors in real time, discarding old samples as new ones arrive, to feed an anomaly-detection rule engine."
  - "**Video streaming quality monitor (Netflix-style CDN):** Tracking the rolling average rebuffer ratio over the last N playback sessions per edge node so CDN engineers can spot regional degradations without a full dataset scan."
constraints:
- Window size N is a positive integer set at construction
- Values are integers or floats
- add() returns a float representing the current average
- Before the window is full, average all values seen so far
- Each add() call should run in O(1) time
examples:
- input: |-
    ma = MovingAverage(3)
    ma.add(1)
    ma.add(10)
    ma.add(3)
  output: |-
    add(1) → 1.0  (window: [1])
    add(10) → 5.5  (window: [1, 10])
    add(3) → 4.666...  (window: [1, 10, 3])
- input: ma.add(5)
  output: 'add(5) → 6.0  (window: [10, 3, 5] — the 1 was evicted)'
starter_code: |-
  class MovingAverage:
      def __init__(self, window_size: int):
          pass

      def add(self, value: float) -> float:
          """Add a value to the stream and return the current moving average."""
          pass
follow_ups:
- Add support for weighted moving averages.
- Support removing the oldest value without adding a new one.
- Extend to compute moving median efficiently.
key_skills:
- circular buffer / deque
- running sum
- sliding window
test_type: class
test_cases:
- label: window updates
  init_args:
  - 3
  ops:
  - add
  - add
  - add
  - add
  op_args:
  - - 1
  - - 10
  - - 3
  - - 5
  expected:
