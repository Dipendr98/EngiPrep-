id: 41
title: Thread-Safe Bounded Queue
category: concurrency
difficulty: Hard
summary: Producer-consumer queue with blocking put and get operations.
description: Implement a thread-safe bounded queue. put(item) blocks if the queue is full. get() blocks if the queue is empty. Support a timeout parameter for both operations. The queue should be efficient and avoid busy-waiting.
scenario: |-
  You're building the in-process handoff layer for a real-time data enrichment pipeline at a logistics company. A pool of Kafka consumer threads pulls shipment tracking events off a topic and pushes them into a shared buffer, while a separate pool of enrichment threads calls a geo-lookup service and writes the enriched records to PostgreSQL. During network slowdowns the enrichment threads fall behind, and without a bounded buffer the Kafka threads would pile up millions of raw events in memory until the pod OOM-kills. You need a queue where producers block when the buffer is full, consumers block when it's empty, and no thread burns CPU spinning in a wait loop.
alt_scenarios:
  - "**Video transcoding service:** Passing raw video frames from a decoder thread to a pool of encoder threads through a bounded in-memory queue, so a slow encoder naturally applies back-pressure to the decoder instead of buffering an entire video in RAM."
  - "**Web crawler:** Coordinating between URL-discovery threads (which find new links) and URL-fetch threads (which download pages), using a bounded queue so a burst of discovered links doesn't spawn unbounded memory growth before fetchers can keep up."
  - "**Print spooler / job queue:** Accepting print jobs from multiple application threads into a fixed-capacity buffer while a printer driver thread drains the queue sequentially, blocking application threads if the spooler is full rather than silently dropping jobs."
constraints:
- Capacity is a positive integer set at construction time.
- put() and get() accept an optional timeout in seconds (float); None means block forever.
- If timeout expires, raise a TimeoutError.
- Items are delivered in FIFO order.
- Must not busy-wait — use condition variables or similar primitives.
- All operations must be safe to call from multiple threads concurrently.
examples:
- input: |-
    q = BoundedQueue(capacity=2)
    q.put('a')
    q.put('b')
    # q is now full
    # In thread-2: q.put('c', timeout=1.0)  -- blocks up to 1s
    # In thread-1: q.get()
  output: get() returns 'a', which frees a slot, so the blocked put('c') in thread-2 succeeds. Queue now contains ['b', 'c'].
- input: |-
    q = BoundedQueue(capacity=3)
    # q is empty
    result = q.get(timeout=0.5)
  output: get() blocks for 0.5 seconds, then raises a Timeout exception because no item was put during that window.
- input: |-
    q = BoundedQueue(capacity=2)
    q.put('x')
    q.put('y')
    print(q.get())
    print(q.get())
  output: '''x'' then ''y'' — FIFO order is preserved.'
starter_code: |
  import threading

  class BoundedQueue:
      def __init__(self, capacity: int):
          pass

      def put(self, item, timeout=None):
          """Add item to the queue. Block if full."""
          pass

      def get(self, timeout=None):
          """Remove and return an item. Block if empty."""
          pass

      def qsize(self) -> int:
          """Return the current number of items in the queue."""
          pass
follow_ups:
- Add a non-blocking try_put / try_get variant.
- 'Support batch operations: put_many and get_many.'
- Add a poison pill mechanism for graceful shutdown.
key_skills:
- locks/mutexes
- condition variables
- circular buffer
- blocking semantics
