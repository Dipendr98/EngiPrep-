id: 80
title: Toggle Set
category: warmup
difficulty: Easy
summary: Maintain a set where repeating an item removes it.
description: Implement ToggleSet with toggle(item) and items() methods. If toggle sees a new item it adds it; if the item already exists it removes it. items() returns the current items sorted ascending.
scenario: |-
  A developer tools team at a code review platform is building a "pinned reviewers" feature where clicking a reviewer's user ID toggles their pinned status on or off. The backend stores the active set of pinned IDs and must return them in a stable sorted order for the UI to render consistently. Because the same reviewer can be toggled on or off multiple times in a session, the toggle-set abstraction must handle repeated operations cleanly.
alt_scenarios:
  - "**Feature flag manager:** A configuration service lets operators toggle feature flags on and off by ID, maintaining a sorted list of currently active flags."
  - "**Multi-select filter UI:** A search backend tracks which filter tags a user has selected, adding on first click and removing on second click."
  - "**Playlist editor:** A music streaming service lets users toggle track IDs into a collaborative playlist, with the current track list returned in sorted order."
constraints:
- Assume items are comparable for sorting.
examples:
- input: |-
    t = ToggleSet()
    t.toggle(2)
    t.toggle(1)
    t.toggle(2)
    t.items()
  output: '[1]'
starter_code: |-
  class ToggleSet:
      def __init__(self):
          pass

      def toggle(self, item) -> None:
          pass

      def items(self) -> list:
          pass
follow_ups:
- Preserve insertion order instead of sorting.
- Support bulk toggles.
key_skills:
- hash map
- stateful
test_type: class
class_name: ToggleSet
test_cases:
- label: toggle flow
  init_args: []
  ops:
  - toggle
  - toggle
  - toggle
  - items
  - toggle
  - items
  op_args:
  - - 2
  - - 1
  - - 2
  - []
  - - 3
  - []
  expected:
  - null
  - null
  - null
  - - 1
  - null
  - - 1
    - 3
explanation: |-
  This warm-up is meant to build confidence around **hash map** with a very small surface area.

  A good answer should still name the invariant or main idea clearly, handle the obvious edge cases, and keep the implementation easy to read.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
- Use a hash map when you need fast membership checks or counts without rescanning the input.
- 'Treat Toggle Set as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
