      def add(self, item: str) -> None:
          pass

      def top_k(self) -> list[tuple[str, int]]:
          pass
follow_ups:
- What if you can only use O(K) memory (approximate algorithms)?
- 'Support a time window: only count items from the last T seconds.'
- Add a remove(item) operation.
