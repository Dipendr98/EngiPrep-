id: 29
title: Top-K Frequent Items in Stream
category: streaming
difficulty: Medium
summary: Track the K most frequently occurring items in a data stream.
description: Implement a streaming heavy-hitters tracker. add(item) records an occurrence. top_k() returns the K most frequent items seen so far with their counts. The stream may be very large, but K is small.
scenario: |-
  Your team runs the centralized error-aggregation pipeline for a microservices platform that ingests 8 million log events per hour across 200 services. The SRE team wants a live "Top 10 Error Codes Right Now" panel in their incident dashboard, updated every 30 seconds, without storing or replaying the full log history. K is always small (5–10 entries), but the event stream is unbounded and can't fit in memory. You're building the streaming heavy-hitter tracker that powers that panel—something that ingests one event at a time and answers top_k() queries in sub-millisecond time.
alt_scenarios:
  - "**Ad-tech platform:** Tracking the top K most-clicked creative IDs in a real-time bidding event stream so campaign managers can identify breakout ads without querying the full impression database."
  - "**E-commerce search team:** Identifying the K most-searched product queries in the current hour's session stream so the merchandising team can monitor trending searches and adjust promoted results."
  - "**Network security appliance:** Surfacing the top K source IP addresses by packet volume in a live traffic stream so a firewall can flag potential DDoS sources without storing every packet header."
constraints:
- K is a positive integer set at construction
- Items are hashable (strings or integers)
- top_k() returns a list of (item, count) tuples sorted by count descending
- Ties in count are broken by item in ascending lexicographic order
- add() should be O(1) amortized; top_k() should be O(K log K) or better
examples:
- input: |-
    tracker = TopKTracker(k=2)
    tracker.add('404')
    tracker.add('500')
    tracker.add('404')
    tracker.add('404')
    tracker.add('500')
    tracker.add('503')
    tracker.top_k()
  output: '[(''404'', 3), (''500'', 2)]  — the 2 most frequent items with their counts'
- input: |-
    tracker.add('503')
    tracker.add('503')
    tracker.add('503')
    tracker.top_k()
  output: |-
    [('404', 3), ('503', 4)]  — wait, 503 now has 4 hits, so:
    [('503', 4), ('404', 3)]  — sorted by count descending
starter_code: |-
  class TopKTracker:
      def __init__(self, k: int):
