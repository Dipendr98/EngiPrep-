id: 40
title: Event Emitter
category: infra
difficulty: Medium
summary: Pub/sub event system with subscribe, unsubscribe, and emit.
description: Implement an event emitter. on(event, callback) registers a listener. off(event, callback) removes it. emit(event, *args) calls all listeners for that event. once(event, callback) registers a listener that auto-removes after one call. Support wildcard listeners that receive all events.
scenario: |-
  You're building the plugin architecture for an internal developer tool—a lightweight code-review assistant that editors and CI integrations extend with plugins. Plugins need to hook into lifecycle events like "review.opened," "comment.posted," and "approval.granted" without the core tool maintaining a hardcoded list of subscribers. You need a pub/sub emitter that lets each plugin register typed listeners, fire one-shot callbacks for initialization events, and supports a wildcard listener so a telemetry plugin can capture every event for usage analytics without being explicitly wired into each event type.
alt_scenarios:
  - "**Node.js stream library internals:** Implementing the EventEmitter that underlies readable and writable streams, where 'data,' 'end,' and 'error' events must be dispatched to multiple listeners in registration order."
  - "**Game engine (Unity-style event bus):** Powering a decoupled event system where game systems like audio, UI, and physics subscribe to gameplay events ('enemy.killed,' 'level.completed') without holding direct references to each other."
  - "**React state management library:** Building the subscription mechanism that notifies UI components when slices of shared state change, using one-time listeners for initialization effects and persistent listeners for ongoing re-renders."
constraints:
- Event names are strings
- Callbacks are callable objects
- emit() calls listeners in the order they were registered
- off() removes a specific callback; it is a no-op if the callback is not found
- once() listeners are removed after their first invocation
- Wildcard '*' listeners receive the event name as the first argument followed by *args
- emit() with no registered listeners for that event is a no-op
examples:
- input: |-
    emitter = EventEmitter()
    results = []
    emitter.on('data', lambda x: results.append(x))
    emitter.emit('data', 42)
    emitter.emit('data', 99)
    results
  output: '[42, 99]  # listener called on each emit with the provided argument'
- input: |-
    once_results = []
    emitter.once('done', lambda msg: once_results.append(msg))
    emitter.emit('done', 'first')
    emitter.emit('done', 'second')
    once_results
  output: '[''first'']  # once() listener auto-removed after the first invocation'
- input: |-
    wild = []
    emitter.on('*', lambda event, *args: wild.append(event))
    emitter.emit('click', 1)
    emitter.emit('hover', 2)
    wild
  output: '[''click'', ''hover'']  # wildcard listener receives the event name plus args'
starter_code: |-
  class EventEmitter:
      def __init__(self):
          pass

      def on(self, event: str, callback) -> None:
          pass

      def off(self, event: str, callback) -> None:
          pass

      def once(self, event: str, callback) -> None:
          pass

      def emit(self, event: str, *args) -> None:
          pass
follow_ups:
- Add namespaced events (e.g. 'user.created', 'user.*').
- Support async listeners and wait for all to complete.
- Add max listener warnings to detect leaks.
key_skills:
- hash map of lists
- callback management
- observer pattern
- memory management
