id: 31
title: Windowed Event Counter
category: streaming
difficulty: Medium
summary: Count events in multiple time windows (1min, 5min, 1hr) efficiently.
description: Implement a counter that tracks events over time. record(timestamp) records an event. count(timestamp, window_seconds) returns the number of events in the last window_seconds as of the given timestamp. Support multiple window sizes efficiently.
scenario: Imagine you're building the monitoring dashboard for a high-traffic API gateway. The ops team wants real-time counters — 'how many 5xx errors in the last minute?' or 'total requests in the last hour?' — all queryable at any point in time with different window sizes. Your job is to build the underlying counter that powers those widgets.
constraints:
- Timestamps are positive integers representing Unix seconds
- Timestamps passed to record() are non-decreasing
- window_seconds is a positive integer
- count() should run in O(log n) or better
- Multiple events may share the same timestamp
examples:
- input: |-
    counter = WindowedEventCounter()
    counter.record(100)
    counter.record(105)
    counter.record(110)
    counter.record(200)
    counter.count(110, 15)
  output: '3  # Events at t=100, 105, 110 are all within the window [95, 110]'
- input: counter.count(110, 5)
  output: '2  # Events at t=105 and t=110 fall within [105, 110]'
- input: counter.count(200, 100)
  output: '4  # All four events (100, 105, 110, 200) fall within [100, 200]'
starter_code: |-
  class WindowedEventCounter:
      def __init__(self):
          pass

      def record(self, timestamp: int) -> None:
          pass

      def count(self, timestamp: int, window_seconds: int) -> int:
          pass
follow_ups:
- Use bucketed counting to reduce memory.
- Add a rate() method that returns events-per-second for a window.
- How would you merge counts from multiple servers?
key_skills:
- sorted list / deque
- binary search
- bucketing
- time-based cleanup
