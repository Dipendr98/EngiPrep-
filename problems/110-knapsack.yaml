id: 110
title: 0/1 Knapsack
category: dynamic programming
difficulty: Medium
summary: Maximize value within a weight budget, using each item at most once.
description: Given a list of items, each with a weight and a value, and a maximum weight capacity, return the maximum total value you can carry. Each item can be used at most once.
scenario: |-
  You're a TPM-facing tools engineer at Spotify, building the sprint-planning optimizer that runs each Monday morning before standup. The tool receives the backlog of proposed features — each scored for business impact and estimated in engineering-weeks — and must recommend the highest-value set of features that fits within the two-week sprint capacity. Each feature is either fully included or excluded; partial work does not count toward the impact score. The recommendation must be computed before the planning meeting starts, typically in under a second.
alt_scenarios:
  - "**Cloud resource provisioner:** A multi-cloud optimizer selects the highest-ROI set of EC2 instance reservations that fits within a fixed monthly cost ceiling, buying each at most once."
  - "**Ad campaign scheduler:** A DSP allocates a fixed impression budget across available ad creatives, selecting the subset with the highest projected click-through value without splitting budgets."
  - "**Satellite payload planner:** A mission-planning tool selects experiments to load onto a satellite given strict mass and power constraints, maximizing total scientific value."
constraints:
- Each item can be used at most once (0/1 — take it or leave it)
- All weights and values are non-negative integers
- capacity is a non-negative integer
- Return 0 if capacity is 0 or no items are given
examples:
- input: 'knapsack(weights=[1,3,4,5], values=[1,4,5,7], capacity=7)'
  output: '9  # items with weights [3,4] give values [4,5]'
- input: 'knapsack(weights=[2,3], values=[3,4], capacity=1)'
  output: '0  # nothing fits'
starter_code: |-
  def knapsack(weights: list[int], values: list[int], capacity: int) -> int:
      pass
follow_ups:
- Return which items were selected, not just the max value.
- Solve the fractional knapsack (you can take partial items) — why is greedy sufficient there?
- What changes if items can be used multiple times (unbounded knapsack)?
key_skills:
- dynamic programming
- 0/1 knapsack
- space optimization
test_type: function
test_cases:
- label: classic case
  kwargs:
    weights:
    - 1
    - 3
    - 4
    - 5
    values:
    - 1
    - 4
    - 5
    - 7
    capacity: 7
  expected: 9
- label: nothing fits
  kwargs:
    weights:
    - 2
    - 3
    values:
    - 3
    - 4
    capacity: 1
  expected: 0
- label: exact fit single item
  kwargs:
    weights:
    - 5
    values:
    - 10
    capacity: 5
  expected: 10
- label: all items fit
  kwargs:
    weights:
    - 1
    - 2
    - 3
    values:
    - 2
    - 3
    - 4
    capacity: 10
  expected: 9
function_name: knapsack
explanation: |-
  2D DP: dp[i][w] = max value using first i items with capacity w.
  - dp[0][*] = 0 (no items)
  - dp[*][0] = 0 (no capacity)
  - For item i: if weights[i-1] <= w: dp[i][w] = max(dp[i-1][w], values[i-1] + dp[i-1][w - weights[i-1]])
  - Else: dp[i][w] = dp[i-1][w]

  Space optimization: reduce to 1D dp array by iterating w from capacity down to weights[i] (right to left prevents using the same item twice).

  The direction matters: left-to-right would let you use an item multiple times (unbounded knapsack).

  Time O(n * capacity), space O(capacity) with 1D optimization.
references:
- The 1D optimization (iterating right-to-left) is interview-standard — understand why the direction prevents double-counting.
- Compare to coin change (unbounded knapsack) — the only difference is iteration direction.
