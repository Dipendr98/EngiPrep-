id: 89
title: "collections.defaultdict"
category: syntax
difficulty: Easy
summary: Use defaultdict to group strings by their length, preserving insertion order within each group.
description: >-
  Implement `group_by_length(words: list[str]) -> dict` that takes a list of strings
  and returns a dict mapping each word length to the list of words with that length,
  in the order they appear.
scenario: >-
  A tokenizer groups extracted words by token length so downstream components
  can process short tokens (stopwords) and long tokens (content words) separately.
constraints:
  - Words are non-empty strings
  - Words within the same length group preserve their original order
examples:
  - input: group_by_length(["hi","hey","hello","yo","world"])
    output: '{2: ["hi", "yo"], 3: ["hey"], 5: ["hello", "world"]}'
starter_code: |-
  def group_by_length(words: list[str]) -> dict:
      pass
follow_ups:
  - How would you return the groups sorted by length key?
  - How would you adapt this to group by the first letter instead?
key_skills:
  - defaultdict
  - grouping
  - collections
  - dict patterns
test_type: function
function_name: group_by_length
test_cases:
  - label: mixed lengths with shared groups
    input:
      words: ["hi", "hey", "hello", "yo", "world"]
    expected: {2: ["hi", "yo"], 3: ["hey"], 5: ["hello", "world"]}
  - label: three distinct groups
    input:
      words: ["a", "bb", "ccc", "dd", "e"]
    expected: {1: ["a", "e"], 2: ["bb", "dd"], 3: ["ccc"]}
  - label: all same length
    input:
      words: ["same", "word", "size"]
    expected: {4: ["same", "word", "size"]}
  - label: empty list
    input:
      words: []
    expected: {}
explanation: |-
  `defaultdict(list)` automatically initializes missing keys with an empty list, so you
  can call `d[key].append(val)` without checking if the key exists first. This is
  cleaner than `d.setdefault(key, []).append(val)` or manually checking `if key not in d`.
  It's the go-to pattern for grouping in interviews.
references:
  - "Python docs: collections.defaultdict — https://docs.python.org/3/library/collections.html#collections.defaultdict"
  - "Pattern: grouping with defaultdict(list)"
