function_name: lca
explanation: |-
  Post-order DFS: recurse into left and right subtrees first, then decide at the current node.

  Base case: if root is None, return None. If root.val equals p or q, return root (this node is one of the targets).

  After recursing: if both left and right returned non-None, this node is the LCA — both targets are in different subtrees. Otherwise return whichever side was non-None.

  The function returns the LCA node; to get its value, return node.val where the node is first found.

  Why it works: a node returns itself only if it equals p or q. The first node that sees returns from both sides must be the deepest such node — the LCA.

  Time O(n), space O(h).
references:
- Post-order is the right traversal order here because you need information from both subtrees before deciding at the current node.
- The BST variant is faster: compare values to navigate left or right without visiting the full tree.
