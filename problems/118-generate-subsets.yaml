function_name: subsets
explanation: |-
  Three equivalent approaches:

  1. Backtracking: start with an empty current subset. At each index, choose to include or exclude nums[i], recurse, then undo (backtrack).
     ```
     def bt(start, curr):
         result.append(list(curr))
         for i in range(start, len(nums)):
             curr.append(nums[i])
             bt(i + 1, curr)
             curr.pop()
     ```

  2. Iterative: start with [[]], and for each number, extend every existing subset with that number.

  3. Bit manipulation: for each number 0..2^n-1, the set bits indicate which elements to include.

  All produce 2^n subsets. Backtracking is the most interview-friendly and generalizes easily to Combinations and Permutations.

  Time O(n * 2^n) — 2^n subsets, each up to length n to copy. Space O(n) for the recursion stack.
references:
- Backtracking template: append current state, loop from start to end, recurse, pop (undo).
- The iterative approach (for each num, double the result set) is elegant and avoids recursion.
