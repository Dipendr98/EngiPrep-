id: 69
title: First Unique Character
category: warmup
difficulty: Easy
summary: Find the index of the first non-repeating character.
description: Implement first_unique_char(s) that returns the index of the first character appearing exactly once, or -1 if none exists.
scenario: |-
  A real-time chat platform at a fintech startup needs to deduplicate rapid-fire user input events. When a trader types a command string, the backend must identify the first character that appears exactly once to determine the canonical intent signal — repeated characters are treated as accidental key-holds from a noisy keyboard. The platform's event processor calls this function on every raw keystroke buffer before dispatching to the order router.
alt_scenarios:
  - "**Stream deduplication:** A Kafka consumer scans incoming event-type codes to find the first code that has not yet been seen twice, flagging it as a novel signal."
  - "**Log anomaly detection:** A log parser finds the first character in a compressed error signature that appears uniquely, used to classify the error family."
  - "**Autocomplete ranking:** A mobile keyboard app identifies the first non-repeated letter in a partial word to break ties in its candidate suggestion ranking."
constraints:
- Assume lowercase ASCII letters.
examples:
- input: first_unique_char("leetcode")
  output: '0'
starter_code: |-
  def first_unique_char(s: str) -> int:
      pass
follow_ups:
- Return the character instead of the index.
- Support streaming input.
key_skills:
- hash map
- strings
test_type: function
function_name: first_unique_char
test_cases:
- label: first char unique
  input:
    s: leetcode
  expected: 0
- label: middle unique
  input:
    s: loveleetcode
  expected: 2
- label: none
  input:
    s: aabb
  expected: -1
explanation: |-
  This warm-up is meant to build confidence around **hash map** with a very small surface area.

  A good answer should still name the invariant or main idea clearly, handle the obvious edge cases, and keep the implementation easy to read.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
- Use a hash map when you need fast membership checks or counts without rescanning the input.
- Practice a few small string transforms by hand so indexing, trimming, and reconstruction feel automatic.
- 'Treat First Unique Character as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
