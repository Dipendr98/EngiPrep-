id: 14
title: Log Pattern Matcher
category: parsing
difficulty: Medium
summary: Extract structured fields from log lines using pattern templates.
description: 'Implement a log parser that takes a pattern like ''{timestamp} [{level}] {message}'' and a log line like ''2024-01-15 [ERROR] disk full'', returning {''timestamp'': ''2024-01-15'', ''level'': ''ERROR'', ''message'': ''disk full''}. Patterns have named fields in braces and literal text between them.'
scenario: |-
  The Site Reliability team at a cloud provider ingests billions of log lines per day from dozens of services, each with a slightly different log format. On-call engineers need to extract structured fields—timestamp, severity, request ID, error message—from raw text without writing a brittle regex for every service. You need a pattern-based parser where the team defines a template like `{timestamp} [{level}] {request_id} - {message}` and the engine extracts the named fields from any matching log line, failing fast with a clear error when a line doesn't conform.
alt_scenarios:
  - "**Security audit pipeline:** A SIEM ingestion layer parses firewall log lines using field-named patterns to extract source IP, destination port, and action into a structured event schema."
  - "**Distributed tracing tool:** A trace collector parses heterogeneous span log formats from multiple languages using named-field templates to normalize them into a unified span record."
  - "**Network device monitoring:** A NOC tool extracts structured fields from syslog messages emitted by routers and switches so alert rules can reference named fields like interface and error_count."
constraints: []
examples: []
starter_code: |-
  def match_log(pattern: str, line: str) -> dict[str, str]:
      pass
follow_ups:
- Support optional fields and multi-line log entries.
- Add type coercion for known field names (timestamp -> datetime, etc.).
- How would you handle log lines that don't match the pattern?
key_skills:
- string parsing
- pattern matching
- greedy vs lazy matching
- regex-like logic
test_type: function
test_cases:
- label: basic parse
  input:
    pattern: '{timestamp} [{level}] {message}'
    line: 2024-01-15 [ERROR] disk full
  expected:
    timestamp: '2024-01-15'
    level: ERROR
    message: disk full
- label: literal mismatch
  input:
    pattern: '[{level}] {message}'
    line: WARN disk full
  expected_error: match
function_name: match_log
explanation: |-
  This problem is mainly about choosing a clean invariant around **string parsing** and then preserving it on every operation.

  A strong solution starts by deciding what state to keep in memory, how each public operation updates that state, and what the time complexity should be in the common case.

  The usual tradeoff here is how **pattern matching** supports the fast path without making updates or edge cases harder to reason about.

  When studying it, write down the data structure layout first, then walk through the smallest tricky example by hand: duplicate updates, missing keys, empty input, or a boundary timestamp/index.

  A polished interview answer should also call out complexity, edge cases, and the invariant that proves the implementation stays correct after each step.
references:
- Translate the input format into tokens and small grammar rules before worrying about implementation details.
- Use examples that hit malformed input, nesting, and precedence to check your parser design.
- After implementing Log Pattern Matcher, re-run the provided hardcoded tests and explain why each one protects an important invariant.
