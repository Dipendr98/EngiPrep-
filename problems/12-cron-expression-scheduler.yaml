id: 12
title: Cron Expression Scheduler
category: parsing
difficulty: Medium
summary: Parse a cron expression and compute the next N run times.
description: Parse a simplified cron expression with five fields (minute, hour, day-of-month, month, day-of-week) supporting values, ranges (1-5), steps (*/15), and lists (1,3,5). Implement next_run(cron_string, after_datetime) that returns the next datetime matching the pattern.
scenario: |-
  The Data Platform team at an e-commerce company runs hundreds of nightly ETL jobs defined by cron expressions in a YAML manifest. When a new job is registered, the scheduler must compute its next five fire times so the team can audit that the expression does what the author intended before it goes to production. Expressions use the full five-field syntax with ranges, steps, and comma-separated lists, and the system needs to handle edge cases like month-end day-of-month overflow correctly.
alt_scenarios:
  - "**Cloud function scheduler:** A serverless platform parses user-supplied cron strings to determine the next invocation time for each function and pre-warms the container that many seconds in advance."
  - "**Database backup orchestrator:** A backup service evaluates cron expressions to schedule snapshot jobs for thousands of database instances, ensuring no two large instances have overlapping windows."
  - "**Email campaign platform:** A marketing tool computes the next send time for recurring newsletter campaigns defined as cron expressions so it can enqueue render jobs at the right moment."
constraints: []
examples: []
starter_code: |-
  from datetime import datetime

  def next_run(cron_string: str, after_datetime: datetime) -> datetime:
      pass
follow_ups:
- Support time zones.
- Compute the previous run time.
- Handle overlapping cron jobs and find schedule conflicts.
key_skills:
- parsing
- datetime arithmetic
- constraint satisfaction
- modular logic
test_type: function
test_cases:
- label: next minute step
  setup_code: |-
    from datetime import datetime
    after = datetime(2024, 1, 1, 10, 7)
    expected_dt = datetime(2024, 1, 1, 10, 15)
  args:
  - '*/15 * * * *'
  - __ref__: after
  expected:
    __ref__: expected_dt
- label: next matching hour
  setup_code: |-
    from datetime import datetime
    after = datetime(2024, 1, 1, 10, 45)
    expected_dt = datetime(2024, 1, 1, 12, 0)
  args:
  - 0 12 * * *
  - __ref__: after
  expected:
    __ref__: expected_dt
function_name: next_run
explanation: |-
  This problem is mainly about choosing a clean invariant around **parsing** and then preserving it on every operation.

  A strong solution starts by deciding what state to keep in memory, how each public operation updates that state, and what the time complexity should be in the common case.

  The usual tradeoff here is how **datetime arithmetic** supports the fast path without making updates or edge cases harder to reason about.

  When studying it, write down the data structure layout first, then walk through the smallest tricky example by hand: duplicate updates, missing keys, empty input, or a boundary timestamp/index.

  A polished interview answer should also call out complexity, edge cases, and the invariant that proves the implementation stays correct after each step.
references:
- Practice turning informal text rules into a tokenizer plus a small set of deterministic parsing steps.
- Translate the input format into tokens and small grammar rules before worrying about implementation details.
- Use examples that hit malformed input, nesting, and precedence to check your parser design.
- After implementing Cron Expression Scheduler, re-run the provided hardcoded tests and explain why each one protects an important invariant.
