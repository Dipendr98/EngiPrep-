      def delete(self, position: int, length: int) -> None:
          pass

      def get_text(self) -> str:
          pass

      def undo(self) -> None:
          pass

      def redo(self) -> None:
          pass
follow_ups:
- Group rapid edits into a single undo step (e.g. typing a word).
- Add cursor position tracking that moves correctly with undo/redo.
- How would you support collaborative editing with multiple users?
