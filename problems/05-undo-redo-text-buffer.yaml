id: 5
title: Undo/Redo Text Buffer
category: stateful
difficulty: Medium
summary: Text buffer supporting insert, delete, undo, and redo operations.
description: Implement a text buffer that supports insert(position, text), delete(position, length), undo(), and redo(). Undo reverts the last operation, redo re-applies it. A new operation after an undo should clear the redo history. Operations should handle boundary conditions gracefully.
scenario: You’re building the core text-editing engine for a lightweight code editor. Users expect fluid insert and delete operations, plus full undo/redo support. The tricky part is keeping the undo and redo stacks consistent—especially when a user undoes a few steps, types something new, and that should discard the entire redo future.
constraints:
- Position is a 0-based index into the current text
- insert(pos, text) inserts before the character at pos
- delete(pos, length) removes length characters starting at pos
- Out-of-range position or length should be clamped to valid bounds
- undo/redo on an empty stack is a no-op
examples:
- input: |-
    buf = TextBuffer()
    buf.insert(0, 'hello')
    buf.insert(5, ' world')
    buf.get_text()
    buf.undo()
    buf.get_text()
    buf.redo()
    buf.get_text()
  output: |-
    'hello world'
    'hello'        # undid the ' world' insert
    'hello world'  # redid the ' world' insert
- input: |-
    buf = TextBuffer()
    buf.insert(0, 'abcdef')
    buf.delete(2, 3)
    buf.get_text()
    buf.undo()
    buf.get_text()
    buf.insert(0, 'X')
    buf.get_text()
    buf.redo()
    buf.get_text()
  output: |-
    'af'       # deleted 'bcd' starting at index 2
    'abcdef'   # undo restored 'bcd'
    'Xabcdef'  # new insert after undo
    'Xabcdef'  # redo is a no-op – stack was cleared by the new insert
starter_code: |-
  class TextBuffer:
      def __init__(self):
