  - ALLOW
  - null
  - DENY
  - DENY
class_name: PermissionResolver
explanation: |-
  This problem is mainly about choosing a clean invariant around **tree traversal** and then preserving it on every operation.

  A strong solution starts by deciding what state to keep in memory, how each public operation updates that state, and what the time complexity should be in the common case.

  The usual tradeoff here is how **inheritance chain** supports the fast path without making updates or edge cases harder to reason about.

  When studying it, write down the data structure layout first, then walk through the smallest tricky example by hand: duplicate updates, missing keys, empty input, or a boundary timestamp/index.

  A polished interview answer should also call out complexity, edge cases, and the invariant that proves the implementation stays correct after each step.
references:
- 'Review constant-time dictionary operations: insert, lookup, delete, and how collisions affect real-world performance.'
- Separate the indexing step from the query step so you know where the work belongs.
- Be explicit about ranking and tie-breaking instead of leaving output order accidental.
- After implementing Permission Inheritance Resolver, re-run the provided hardcoded tests and explain why each one protects an important invariant.
