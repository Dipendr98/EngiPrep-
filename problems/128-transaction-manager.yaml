explanation: |-
  Data model: a base `_store` dict and a `_txn_stack` list of dicts (one per active transaction level). A special sentinel value (e.g., a _DELETED object) marks deleted keys within a layer.

  get(key): walk the stack from top (innermost) to bottom, then the base store. Return the first match, or default. If the value is _DELETED, return default.

  set(key, value): write to the top of the stack (or _store if no active transaction).

  delete(key): write _DELETED sentinel to the top of the stack (or remove from _store).

  commit(): pop the top layer and merge its contents into the layer below it (or _store if outermost). Merged overwrites, including _DELETED sentinels (so a delete in the inner layer propagates outward). Raise RuntimeError if stack is empty.

  rollback(): pop and discard the top layer. Raise RuntimeError if stack is empty.

  The sentinel approach for deletes is cleaner than a separate deleted-keys set per layer because it participates naturally in the layer lookup order.
references:
- The _DELETED sentinel lets deletes participate in the same layer-lookup order as sets — no separate tracking needed.
- commit() merges into the layer below (not the base store) when nested — the outer transaction still controls whether to commit further.
