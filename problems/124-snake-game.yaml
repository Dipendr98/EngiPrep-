explanation: |-
  Data model:
  - `body`: a deque of (row, col) tuples, front = head, back = tail.
  - `body_set`: a set of (row, col) for O(1) collision detection.
  - `food_idx`: index into the food list tracking which food is next.
  - `score`: number of food eaten.

  move logic:
  1. Compute new head position.
  2. If out of bounds → return -1.
  3. Remove the tail from body_set FIRST (the tail moves out before checking collision — the head can legally enter the cell the tail just vacated).
  4. If new head is in body_set → collision, return -1.
  5. Append new head.
  6. If new head == current food: score++, advance food_idx, do NOT remove tail (add it back to body_set).
  7. Else: popleft (remove tail tip, don't add back).

  Step 3 is the subtlety: remove tail from set before collision check, then conditionally add it back. This handles the edge case where the snake's head chases its own tail.
references:
- Remove the tail from the set before the collision check — the head can enter the cell the tail is vacating.
- Use a deque for O(1) append (new head) and popleft (old tail); use a set for O(1) body collision detection.
