function_name: interleave
explanation: |-
  interleave: use a SENTINEL to detect exhaustion. Wrap each generator with a try/except StopIteration or use next(gen, SENTINEL). Alternate between the two; when one returns SENTINEL, drain the other.

  ```python
  _DONE = object()
  def interleave(a, b):
      while True:
          va = next(a, _DONE)
          if va is not _DONE: yield va
          vb = next(b, _DONE)
          if vb is not _DONE: yield vb
          if va is _DONE and vb is _DONE: break
  ```

  merge_sorted: peek one element from each generator (using next + sentinel). While both have values, yield the smaller one and advance that generator. When one is exhausted, yield the remaining elements from the other.

  Both are O(1) memory — only one element is buffered from each source at any time.

  This is the generator-based equivalent of thread alternation: two "threads" (generators) must coordinate their output in a deterministic, interleaved order without real concurrency or locks.
references:
- Use a sentinel object (not None, which could be a valid value) to signal generator exhaustion.
- merge_sorted is the same algorithm as merging two sorted arrays — just adapted for pull-based generators.
