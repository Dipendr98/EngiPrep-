id: 4
title: Sliding Window Rate Limiter
category: stateful
difficulty: Medium
summary: Rate limiter that enforces N requests per sliding time window.
description: Implement a rate limiter that allows at most N requests within a sliding window of W seconds for a given client ID. allow(client_id, timestamp) returns True if the request is allowed, False otherwise. The implementation should be memory-efficient even with many clients.
scenario: |-
  The API Security team at a payments company discovered that a handful of merchant integrations were issuing thousands of charge requests per minute, causing downstream database contention. You need to add a per-merchant rate limiter to the gateway that enforces a strict sliding-window policy—not a fixed bucket, because fixed buckets allow a burst of 2N requests straddling a bucket boundary. The limiter must be lightweight enough to run in-process on each gateway replica without a shared backing store.
alt_scenarios:
  - "**SMS notification service:** A customer-messaging platform limits each user account to N outbound texts per rolling 24-hour window to stay within carrier anti-spam thresholds."
  - "**LLM API proxy:** An AI-gateway team enforces per-user token-rate limits over a sliding 60-second window so individual tenants can't starve shared GPU capacity."
  - "**Web scraper politeness policy:** A data-collection service caps outbound requests to each target domain at N per W seconds to avoid triggering the target's own rate limiting."
constraints:
- client_id is a string
- Timestamps are positive integers (seconds) given in non-decreasing order
- The window is a strict sliding window, not a fixed bucket
- Memory should scale with active clients, not total request volume
examples:
- input: |-
    rl = RateLimiter(max_requests=3, window_seconds=10)
    rl.allow('client_A', 1)
    rl.allow('client_A', 2)
    rl.allow('client_A', 3)
    rl.allow('client_A', 4)
    rl.allow('client_A', 12)
  output: |-
    True   # 1st request
    True   # 2nd request
    True   # 3rd request
    False  # 4th request within 10s window, denied
    True   # timestamp 1 has left the window [2,12]
- input: |-
    rl = RateLimiter(max_requests=2, window_seconds=5)
    rl.allow('X', 1)
    rl.allow('Y', 1)
    rl.allow('X', 2)
    rl.allow('Y', 2)
    rl.allow('X', 3)
  output: |-
    True   # X: 1st
    True   # Y: 1st (independent window)
    True   # X: 2nd
    True   # Y: 2nd
    False  # X: 3rd within 5s, denied
- input: |-
    rl = RateLimiter(max_requests=1, window_seconds=3)
    rl.allow('A', 1)
    rl.allow('A', 2)
    rl.allow('A', 5)
  output: |-
    True   # 1st request at t=1
    False  # t=2 is within 3s of t=1
    True   # t=5, the window [3,5] has no prior requests
starter_code: |-
  class RateLimiter:
      def __init__(self, max_requests: int, window_seconds: int):
          pass

      def allow(self, client_id: str, timestamp: int) -> bool:
          pass
follow_ups:
- 'Add multiple tiers: e.g. 10/second AND 100/minute.'
- How would you distribute this across multiple servers?
- Add a method that returns how many seconds until the next request would be allowed.
