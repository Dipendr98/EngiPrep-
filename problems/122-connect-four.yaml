explanation: |-
  Gravity: find the lowest empty row in a column by scanning from bottom (row 5) upward.

  Win detection: after placing a piece at (r, c), check all four directions from that cell. For each direction (horizontal, vertical, and both diagonals), count consecutive same-player pieces both ways and sum them. If total >= 4 (including the placed piece), it's a win.

  Direction vectors: (0,1), (1,0), (1,1), (1,-1) — each covers a pair of opposite directions.

  Draw: check if all cells in row 0 (the top) are non-zero — if so and no winner, the board is full.

  Common bugs:
  1. Checking all cells for a win rather than only the cells adjacent to the just-played piece (still correct but O(rows*cols) not O(1)).
  2. Off-by-one in the consecutive-count loop (should include the placed piece itself).
references:
- Check only from the last-placed piece in all 4 directions — this is faster and avoids re-scanning the whole board.
- The ±direction trick (count both ways on the same axis and sum) is the cleanest way to detect four-in-a-row.
