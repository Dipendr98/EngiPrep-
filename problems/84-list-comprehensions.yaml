id: 84
title: "List Comprehensions"
category: syntax
difficulty: Easy
summary: Use a list comprehension with a filter to transform strings longer than 3 characters to uppercase.
description: >-
  Implement `transform(words: list[str]) -> list[str]` that takes a list of strings
  and returns a new list containing the uppercase version of each string whose length
  is greater than 3, preserving original order.
scenario: |-
  A platform engineering team at a cloud company is building a structured log parser that tokenizes raw log lines from their API gateway. Short tokens like "at", "in", and "to" are stop words that add noise to the alert-matching rules, so the pipeline filters them out and uppercases the surviving tokens before handing them off to the pattern matcher. The engineer wants a single-line list comprehension to keep the transformation readable and testable.
alt_scenarios:
  - "**Search indexer:** An inverted index builder filters single-character tokens from a tokenized document and upcases the rest before inserting them into the index."
  - "**ETL pipeline:** A data cleaning job selects only long-form country codes from a mixed list and normalizes them to uppercase before joining with a reference table."
  - "**Config validator:** A deployment tool extracts environment variable names longer than three characters and uppercases them to check against a policy allowlist."
constraints:
  - Words consist of ASCII letters only
  - Preserve the relative order of qualifying words
examples:
  - input: transform(["hi","hello","hey","world"])
    output: '["HELLO", "WORLD"]'
starter_code: |-
  def transform(words: list[str]) -> list[str]:
      pass
follow_ups:
  - How would you also exclude words that contain digits?
  - Can you rewrite this as a generator expression instead?
key_skills:
  - list comprehension
  - filtering
  - string methods
  - conditional expression
test_type: function
function_name: transform
test_cases:
  - label: mixed lengths
    input:
      words: ["hi", "hello", "hey", "world"]
    expected: ["HELLO", "WORLD"]
  - label: boundary at length 4
    input:
      words: ["a", "bb", "ccc", "dddd"]
    expected: ["DDDD"]
  - label: all qualify
    input:
      words: ["python", "is", "great"]
    expected: ["PYTHON", "GREAT"]
  - label: empty list
    input:
      words: []
    expected: []
explanation: |-
  List comprehensions combine a transformation and an optional filter in one expression:
  `[expr for x in iterable if condition]`. This is more readable and often faster than
  a for loop with append. The pattern `if len(w) > 3` filters before the transformation
  runs.
references:
  - "Python docs: list comprehensions — https://docs.python.org/3/tutorial/datastructures.html#list-comprehensions"
  - "PEP 202: List Comprehensions"
