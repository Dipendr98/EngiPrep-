id: 126
title: Deck of Cards
category: stateful
difficulty: Easy
summary: Model a standard deck with shuffle, deal, and reset — classic OOP design.
description: Design a Deck class that models a standard 52-card deck (4 suits × 13 ranks). Implement shuffle() to randomize the remaining cards, deal() to remove and return the top card, cards_remaining() to return the count, and reset() to restore and re-shuffle the full deck. A Card has a suit and rank.
scenario: |-
  You're a platform engineer at a social gaming startup building a shared card game engine library that three product teams — Poker, Blackjack, and Go Fish — will integrate independently. The library must be clean, predictable, and fully testable in CI without flaky randomness: callers pass a seed so integration tests get deterministic deal sequences, while production omits the seed for true randomness. The Deck class is the foundation every game variant builds on.
alt_scenarios:
  - "**Test data factory:** A QA tooling library provides a seeded, resettable data generator that produces shuffled samples from a fixed corpus, giving CI pipelines reproducible test fixtures while keeping production runs randomized."
  - "**A/B experiment assignment:** An experimentation platform maintains a pool of variant tokens, deals them out to incoming users in a shuffled order, and resets the pool each experiment cycle — with seeding available for offline analysis and replay."
  - "**Job scheduler with random priority:** A batch job dispatcher holds a shuffled queue of pending tasks, pops the top task on each scheduling tick, and reseeds the queue at the start of each scheduling epoch to prevent starvation."
constraints:
- Suits are 'Hearts', 'Diamonds', 'Clubs', 'Spades'
- Ranks are 2–10, 'Jack', 'Queen', 'King', 'Ace' (13 total)
- deal() raises IndexError when the deck is empty
- shuffle() randomizes whatever cards remain (not just a full deck)
- reset() restores all 52 cards and shuffles
- Card objects must support str() for display, e.g. 'Ace of Spades'
examples:
- input: |-
    d = Deck(seed=42)
    d.cards_remaining()   # 52
    c = d.deal()
    str(c)                # some card
    d.cards_remaining()   # 51
  output: '52, "7 of Hearts", 51  (exact card depends on seed)'
starter_code: |-
  import random

  class Card:
      SUITS = ['Hearts', 'Diamonds', 'Clubs', 'Spades']
      RANKS = [2, 3, 4, 5, 6, 7, 8, 9, 10, 'Jack', 'Queen', 'King', 'Ace']

      def __init__(self, suit: str, rank):
          self.suit = suit
          self.rank = rank

      def __str__(self) -> str:
          pass

      def __repr__(self) -> str:
          return self.__str__()


  class Deck:
      def __init__(self, seed: int = None):
          """Initialize and shuffle a full 52-card deck. seed for reproducibility."""
          pass

      def shuffle(self) -> None:
          """Shuffle the remaining cards in place."""
          pass

      def deal(self):
          """Remove and return the top Card. Raises IndexError if empty."""
          pass

      def cards_remaining(self) -> int:
          """Return the number of cards left in the deck."""
          pass

      def reset(self) -> None:
          """Restore all 52 cards and shuffle."""
          pass
