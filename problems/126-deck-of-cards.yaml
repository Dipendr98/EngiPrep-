explanation: |-
  Card.__str__ should return '{rank} of {suit}'.

  Deck internally holds a list of Card objects. __init__ calls reset() to build and shuffle. shuffle() uses random.shuffle in-place on the remaining list. deal() pops from the end (O(1)) — index 0 is "top of deck" conventionally but end-of-list pop is identical in behavior and faster.

  Seeding: pass seed to random.seed() at construction (and in reset) for reproducibility in tests.

  reset() rebuilds all 52 cards using a nested comprehension over SUITS × RANKS, then calls shuffle().

  Design discussion points:
  - Why separate Card and Deck classes? Single responsibility.
  - Why a seed parameter? Testability.
  - Why pop() over pop(0)? O(1) vs O(n).
  - What would a Shoe (multi-deck) look like? Compose multiple Decks.
references:
- Use pop() from the end of the list for O(1) deal — the "top" of the deck is just a convention.
- Accept a seed in the constructor to make the class testable without mocking random.
