id: 78
title: Simple Queue
category: warmup
difficulty: Easy
summary: Implement a tiny FIFO queue API.
description: Implement SimpleQueue with enqueue(x), dequeue(), peek(), and is_empty().
scenario: A small FIFO object is a nice stateful warm-up before more complex queue or scheduler questions.
constraints:
- dequeue() and peek() are only called when the queue is not empty.
examples:
- input: |-
    q = SimpleQueue()
    q.enqueue(1)
    q.enqueue(2)
    q.dequeue()
  output: '1'
