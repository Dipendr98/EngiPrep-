explanation: |-
  This warm-up is meant to build confidence around **queue** with a very small surface area.

  A good answer should still name the invariant or main idea clearly, handle the obvious edge cases, and keep the implementation easy to read.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
- Queues help when items must leave in the same order they arrived.
- 'Treat Simple Queue as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
