function_name: is_valid_bst
explanation: |-
  The common mistake: checking only that left.val < node.val < right.val. This misses cases like [10, 5, 15, null, null, 6, 20] where 6 is locally valid (6 < 15) but globally invalid (6 < 10, so it can't be in 10's right subtree).

  The correct approach: propagate a (min_val, max_val) range through the recursion. For the root, the range is (-inf, +inf). When descending left, update max to the current node's value. When descending right, update min.

  A node is invalid if its value falls outside the range. Return True only if both subtrees are valid with updated ranges.

  Time O(n), space O(h) for the call stack.
references:
- The in-order traversal of a valid BST yields a strictly increasing sequence — that is an alternative O(n) check.
- Range propagation is the canonical interview approach because it is O(n) with no extra list allocation.
