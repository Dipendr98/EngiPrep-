id: 74
title: Simple Counter
category: warmup
difficulty: Easy
summary: Implement a tiny stateful counter API.
description: Implement Counter with increment(), decrement(), reset(), and value() methods.
scenario: A very small stateful warm-up helps you talk through invariants before deeper object-design problems.
constraints:
- The counter starts at 0.
