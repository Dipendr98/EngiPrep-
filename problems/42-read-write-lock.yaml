id: 42
title: Read-Write Lock
category: concurrency
difficulty: Hard
summary: Lock that allows concurrent readers but exclusive writers.
description: 'Implement a read-write lock. acquire_read() allows multiple concurrent readers. acquire_write() is exclusive: no other readers or writers. Prevent writer starvation: if a writer is waiting, new readers should not be granted access until the writer finishes.'
scenario: |-
  You're on the Core Infrastructure team at a high-throughput ad-serving platform. Every ad decision reads from an in-memory feature-flag store that's shared across 64 request-handler threads, but the store is refreshed from the configuration service only every 30 seconds by a single background goroutine. Using a plain mutex causes all 64 handlers to serialize on every flag check, adding milliseconds of contention at peak load and directly costing revenue. You need a lock that lets all readers proceed in parallel but gives the config-refresh writer exclusive access—and crucially, a continuous stream of incoming requests can't be allowed to starve the writer by always holding a read lock.
alt_scenarios:
  - "**In-memory cache layer (Guava/Caffeine-style):** Protecting a shared cache map where hundreds of threads read cached responses per second and only an async expiry thread writes, requiring readers to never block each other."
  - "**DNS resolver cache:** Allowing concurrent reader threads to resolve cached hostnames while a single TTL-expiry thread invalidates stale entries under an exclusive write lock, without reader threads starving the expiry sweep."
  - "**Routing table in a software-defined router:** Letting packet-forwarding threads read the forwarding table in parallel at line rate while a control-plane thread installs new routes under an exclusive write lock that doesn't get starved by continuous forwarding traffic."
constraints:
- Multiple readers may hold the lock concurrently.
- A writer must have exclusive access — no other readers or writers.
- If a writer is waiting, new reader requests must queue behind the writer (starvation prevention).
- You may use threading.Lock and threading.Condition as building blocks.
- release_read/release_write should raise if called without a matching acquire.
examples:
- input: |-
    rw = ReadWriteLock()
    rw.acquire_read()   # Thread A
    rw.acquire_read()   # Thread B (concurrent with A)
    # Both threads read concurrently
    rw.release_read()   # Thread A done
    rw.release_read()   # Thread B done
  output: Both acquire_read() calls succeed immediately and run concurrently. No blocking occurs.
- input: |-
    rw = ReadWriteLock()
    rw.acquire_read()    # Thread A holds read
    # Thread B: rw.acquire_write()  -- blocks waiting for A
    # Thread C: rw.acquire_read()   -- should also block (writer waiting)
    rw.release_read()    # Thread A releases
  output: Thread B's acquire_write() now succeeds. Thread C's acquire_read() remains blocked until B calls release_write(), preventing writer starvation.
- input: |-
    rw = ReadWriteLock()
    rw.acquire_write()   # Thread A holds write
    # Thread B: rw.acquire_write()  -- blocks
    rw.release_write()   # Thread A releases
  output: Thread B's acquire_write() now succeeds. Only one writer holds the lock at a time.
starter_code: |
  import threading

  class ReadWriteLock:
      def __init__(self):
          pass

      def acquire_read(self):
          """Acquire the lock for reading (shared)."""
          pass

      def release_read(self):
          """Release a previously acquired read lock."""
          pass

      def acquire_write(self):
          """Acquire the lock for writing (exclusive)."""
          pass

      def release_write(self):
          """Release a previously acquired write lock."""
          pass
