id: 132
title: Debug — Fix the Sliding Window Maximum
category: debugging
difficulty: Medium
summary: Find and fix bugs in a sliding window maximum implementation using a deque.
description: The implementation below is supposed to find the maximum value in every window of size k as it slides across the array, returning a list of maximums. It has three bugs that cause wrong results on various inputs. Find and fix all three bugs without changing the algorithm's O(n) approach.
scenario: |-
  You're a senior engineer on the Observability team at a cloud infrastructure company. The SLA dashboard that displays rolling peak latency over a configurable look-back window (k samples) is showing incorrect maximums during incident review sessions — engineers are missing real spikes because the displayed peak is wrong. You've been handed the deque-based implementation and a set of failing regression tests; your job is to identify and fix all three bugs without regressing the O(n) complexity that makes the dashboard viable at 10k metrics/second.
alt_scenarios:
  - "**Real-time fraud scoring:** A payments risk engine computes the maximum transaction amount in a rolling k-second window to flag velocity anomalies; the same eviction off-by-one and inverted monotone comparison cause legitimate large transactions to be silently omitted from the window maximum."
  - "**Video streaming bitrate controller:** An adaptive bitrate algorithm tracks the peak bandwidth sample over the last k probes to set encoding quality; the first-window bug causes the controller to under-estimate available bandwidth at stream start, triggering unnecessary quality downgrades."
  - "**Stock trading signal generator:** An algorithmic trading service computes the rolling high price over a k-bar window to generate breakout signals; the same three bugs cause the signal to fire one bar late and report stale highs, leading to missed entries."
constraints:
- Return a list of max values for each window position (len(nums) - k + 1 values total)
- Use the deque-based O(n) approach — do not replace with O(n*k) brute force
- k is guaranteed to be between 1 and len(nums) inclusive
examples:
- input: 'sliding_window_max([1,3,-1,-3,5,3,6,7], 3)'
  output: '[3,3,5,5,6,7]'
- input: 'sliding_window_max([1], 1)'
  output: '[1]'
starter_code: |-
  from collections import deque

  def sliding_window_max(nums: list[int], k: int) -> list[int]:
      # The deque stores INDICES (not values) of useful candidates.
      # Invariant: deque is monotonically decreasing by value (front = max of window).

      result = []
      dq = deque()  # stores indices

      for i in range(len(nums)):
          # Bug 1: should remove indices that are out of the current window
          # Current (wrong): removes if index < i - k (off by one)
          if dq and dq[0] < i - k:     # BUG 1: should be <= not <
              dq.popleft()

          # Bug 2: should pop from the RIGHT while back element is smaller
          # Current (wrong): pops while back element is LARGER (inverted comparison)
          while dq and nums[dq[-1]] >= nums[i]:  # BUG 2: should be <=, not >=
              dq.pop()

          dq.append(i)

          # Bug 3: window hasn't formed yet — should start collecting at i >= k-1
          # Current (wrong): starts at i >= k (misses the first complete window)
          if i >= k:                    # BUG 3: should be i >= k - 1
              result.append(nums[dq[0]])

      return result
follow_ups:
- Implement sliding window minimum (trivial change — explain it).
- Return the index of the maximum instead of its value.
- Extend to a 2D sliding window maximum (harder).
key_skills:
- debugging
- monotonic deque
- sliding window
- invariant reasoning
