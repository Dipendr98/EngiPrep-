function_name: sliding_window_max
explanation: |-
  The three bugs and their fixes:

  **Bug 1 — Eviction condition**: `dq[0] < i - k` should be `dq[0] <= i - k`.
  - When i = k, the window is [1..k] (0-indexed: [0..k-1]). Index 0 is the leftmost valid cell; index 0 is valid at i=k-1 but NOT at i=k.
  - `0 < k - k = 0` is False → index 0 is never evicted even when it's out of the window.
  - Fix: `<=` evicts index 0 when i=k: `0 <= k - k = 0` is True.

  **Bug 2 — Monotone direction**: `nums[dq[-1]] >= nums[i]` should be `nums[dq[-1]] < nums[i]` (or equivalently, pop while `<= ` depending on tie-breaking preference).
  - The deque must be monotonically decreasing. We pop from the back when the back element is SMALLER than the incoming element (it can never be the future max).
  - The buggy code pops when the back is LARGER — this destroys the invariant entirely.
  - Fix: `while dq and nums[dq[-1]] < nums[i]: dq.pop()` or `nums[dq[-1]] <= nums[i]`.

  **Bug 3 — Window formation**: `if i >= k` should be `if i >= k - 1`.
  - The first complete window is at index k-1 (0-indexed). The buggy code waits until index k, skipping the first window entirely.
  - Fix: `if i >= k - 1`.
references:
- Draw the deque state by hand for the first 3 iterations of a small example before debugging in code.
- The monotonic deque invariant: front = current window max; back is always <= the element in front of it.
