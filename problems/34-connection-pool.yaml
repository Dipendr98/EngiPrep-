id: 34
title: Connection Pool
category: infra
difficulty: Hard
summary: Manage a pool of reusable connections with checkout, return, and health checks.
description: Implement a connection pool with a max size. acquire() returns an available connection or blocks/waits if all are in use. release(conn) returns a connection to the pool. Connections should be health-checked before reuse. Support a max_idle_time after which unused connections are closed.
scenario: |-
  Your team owns a high-throughput order-processing service that talks to a PostgreSQL primary. During flash sales, traffic spikes 10x in seconds and you're seeing P99 latency jump from 20ms to 800ms—profiling reveals that most of that time is spent in SSL handshake during new connection establishment. The database admin has also capped max_connections at 200, which you're blowing past under load. You're building a connection pool that pre-warms connections, reuses them across requests, health-checks before handing one out, and releases idle connections after a configurable timeout so you don't hold slots during the long quiet periods between sales.
alt_scenarios:
  - "**Data pipeline team (Snowflake or Redshift):** Pooling expensive warehouse sessions across multiple ETL worker threads so batch jobs don't each spend seconds authenticating and negotiating a new session per query."
  - "**Redis client library internals:** Managing a pool of TCP connections to a Redis cluster so application threads can check out a connection, run a command, and return it without paying the connection-setup cost on every cache read."
  - "**gRPC service mesh:** Reusing long-lived HTTP/2 streams to downstream microservices across concurrent request handlers, with health-check pings to detect stale streams before handing them to a caller."
constraints:
- max_size is a positive integer (maximum number of connections)
- max_idle_time is in seconds
- acquire() blocks if no connections are available and the pool is at max_size
- release() of a connection not from this pool should raise ValueError
- health_check is a callable that takes a connection and returns True if alive
- create_conn is a zero-argument callable that returns a new connection object
examples:
- input: |-
    pool = ConnectionPool(create_conn=make_db_conn, health_check=ping,
                          max_size=2, max_idle_time=60.0)
    conn1 = pool.acquire()
    conn2 = pool.acquire()
    # pool is now fully checked out
  output: conn1 and conn2 are live connection objects returned from the pool
- input: |-
    pool.release(conn1)
    conn3 = pool.acquire()  # reuses conn1 after health check passes
  output: conn3 is the same object as conn1 (reused, not newly created)
- input: |-
    # After 60+ seconds idle, close_idle() is called
    removed = pool.close_idle()
    conn4 = pool.acquire()  # creates a fresh connection
  output: removed = 1 (one idle connection was closed); conn4 is a new connection
starter_code: |-
