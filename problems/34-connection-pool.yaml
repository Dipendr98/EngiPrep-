class_name: ConnectionPool
explanation: |-
  This problem is mainly about choosing a clean invariant around **queue** and then preserving it on every operation.

  A strong solution starts by deciding what state to keep in memory, how each public operation updates that state, and what the time complexity should be in the common case.

  The usual tradeoff here is how **state tracking** supports the fast path without making updates or edge cases harder to reason about.

  When studying it, write down the data structure layout first, then walk through the smallest tricky example by hand: duplicate updates, missing keys, empty input, or a boundary timestamp/index.

  A polished interview answer should also call out complexity, edge cases, and the invariant that proves the implementation stays correct after each step.
references:
- Think about FIFO guarantees and how queues model work scheduling and buffered flow.
- Study acquisition, release, reuse, and shutdown paths so resources never leak or get reused unsafely.
- 'Design for lifecycle edges: startup, retries, cleanup, shutdown, and bad inputs.'
- Explain which failures should be surfaced, retried, ignored, or quarantined.
