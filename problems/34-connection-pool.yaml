follow_ups:
- Add a timeout for acquire() so callers don't wait forever.
- 'Add metrics: active count, idle count, wait time histogram.'
- How would you handle a connection that is never returned (leak detection)?
key_skills:
- queue
- state tracking
- resource lifecycle
- timeout management
