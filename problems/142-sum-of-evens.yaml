id: 142
title: Sum of Evens
category: warmup
difficulty: Easy
summary: Sum all even numbers in a list.
description: Implement sum_evens(nums) that returns the sum of all even integers in nums.
scenario: |-
  A payroll system calculates overtime bonuses only for employees with even employee-number IDs (a legacy partitioning scheme). The bonus engine receives the full list of IDs and salaries and must quickly sum the qualifying salaries. The function is called nightly for every pay period.
alt_scenarios:
  - "**A/B test aggregation:** An analytics platform sums conversion values for user IDs in the even partition to compare with the odd partition control group."
  - "**Energy meter audit:** A smart grid aggregator sums only even-timestamped readings from a sensor to match a specific sampling protocol."
constraints:
  - nums may be empty. Return 0 for an empty list.
examples:
  - input: sum_evens([1, 2, 3, 4, 5, 6])
    output: '12'
starter_code: |-
  def sum_evens(nums: list[int]) -> int:
      pass
follow_ups:
  - Generalize to sum_divisible_by(nums, k).
  - Return the sum of odd numbers as well in one pass.
key_skills:
  - arrays
  - counting
test_type: function
function_name: sum_evens
test_cases:
  - label: mixed
    input:
      nums: [1, 2, 3, 4, 5, 6]
    expected: 12
  - label: no evens
    input:
      nums: [1, 3, 5]
    expected: 0
  - label: all evens
    input:
      nums: [2, 4, 6]
    expected: 12
  - label: empty
    input:
      nums: []
    expected: 0
explanation: |-
  This warm-up is meant to build confidence around **arrays** with a very small surface area.

  sum(x for x in nums if x % 2 == 0) is idiomatic. A for-loop accumulator is equally valid.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
  - Generator expressions inside sum() avoid building an intermediate list.
  - 'Treat Sum of Evens as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
