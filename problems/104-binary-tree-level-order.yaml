function_name: level_order
explanation: |-
  Use a queue (deque). Start by enqueuing the root. Each iteration processes exactly one level: snapshot the current queue length, dequeue that many nodes, collect their values, and enqueue their children.

  The snapshot-length trick is the key: it freezes the boundary between the current level and the next before you start adding children.

  Time O(n), space O(n) for the queue (worst case: a complete binary tree's last level holds n/2 nodes).

  Contrast with DFS level-order: you can do it with a depth parameter, but BFS is more natural and avoids stack overhead.
references:
- The "snapshot queue size" pattern is the standard way to process one level at a time in BFS — memorize it.
- A deque from collections is preferred over a list for O(1) popleft.
