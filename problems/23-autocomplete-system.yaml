id: 23
title: Autocomplete System
category: search
difficulty: Medium
summary: Prefix-based search engine returning top results ranked by frequency.
description: Implement an autocomplete system. add(sentence, frequency) adds or updates a sentence. search(prefix) returns the top 3 sentences matching the prefix, sorted by frequency then lexicographically. Typing should feel fast, so search must be efficient.
scenario: |-
  You're on the Search Platform team at a large e-commerce company, responsible for the product search bar that handles 50K queries per minute. As a shopper types "wire" in the search box, your system needs to surface the top 3 most-searched completions—"wireless earbuds," "wire shelving," "wireless charger"—within a single-digit millisecond budget. The product team mandates frequency-based ranking so popular queries surface first, with alphabetical tie-breaking for a stable user experience. You're building the in-process autocomplete engine that runs inside each search API pod, pre-loaded with query history from the past 30 days.
alt_scenarios:
  - "**IDE tooling team (JetBrains/VS Code plugin):** Surfacing the top method and variable name completions from a user's own codebase as they type, ranked by how often each symbol appears in the project."
  - "**Customer support platform (Zendesk-style):** Suggesting the most-used saved reply templates as an agent begins typing, so common responses appear instantly without scrolling through a long list."
  - "**CLI tool for a cloud provider:** Auto-completing resource names and flags in a terminal as engineers type partial commands, ranked by frequency of past invocations in that user's shell history."
constraints:
- Sentences are lowercase, containing letters, digits, and spaces
- search() returns at most 3 results
- Ties in frequency are broken lexicographically (ascending)
- Calling add() with an existing sentence adds to its current frequency
- search() must be efficient enough for interactive use
examples:
- input: |-
    add('i love python', 5)
    add('i love java', 3)
    add('i love coding', 2)
    search('i love')
  output: '[''i love python'', ''i love java'', ''i love coding'']  — sorted by frequency descending'
- input: |-
    add('i love python', 2)   # frequency is now 5+2 = 7
    search('i love')
  output: '[''i love python'', ''i love java'', ''i love coding'']  — python''s freq increased to 7'
- input: search('xyz')
  output: '[]  — no sentences match the prefix'
starter_code: |-
  class AutocompleteSystem:
      def __init__(self):
          pass

      def add(self, sentence: str, frequency: int) -> None:
          """Add a sentence or increase its frequency if it already exists."""
          pass

      def search(self, prefix: str) -> list[str]:
          """Return top 3 sentences matching the prefix, by frequency desc then lex asc."""
          pass
follow_ups:
- Support fuzzy matching (1-2 character edits).
- Add recency weighting so recent searches rank higher.
- How would you handle this with millions of entries?
key_skills:
- trie
- heap/top-k
- prefix matching
- sorting
test_type: class
test_cases:
- label: top three by frequency
  init_args: []
