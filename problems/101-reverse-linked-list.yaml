  - - 42
  expected:
  - 42
function_name: reverse_linked_list
explanation: |-
  The key insight is maintaining three pointers: prev (starts None), curr (starts at head), and a saved next_node.

  At each step: save curr.next, point curr.next to prev, advance prev to curr, advance curr to saved next. After the loop, prev is the new head.

  The invariant: at the start of each iteration, everything before curr is already reversed and prev points to the last reversed node.

  Edge cases: empty list returns None immediately; single node requires no work but the loop still handles it correctly.

  Time O(n), space O(1). Recursive version is elegant but uses O(n) stack frames.
references:
- Think about what three things you need to remember at each step before you overwrite the next pointer.
- The iterative approach is preferred over recursive for large lists due to stack overflow risk.
