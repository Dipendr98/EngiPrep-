id: 45
title: Consistent Hash Ring
category: concurrency
difficulty: Hard
summary: Distribute keys across nodes with minimal reassignment on node changes.
description: Implement a consistent hash ring for distributing keys across N server nodes. add_node(node_id) and remove_node(node_id) should minimize key reassignment. get_node(key) returns which node a key belongs to. Use virtual nodes for better balance.
scenario: |-
  Your team operates a multi-region Memcached fleet that sits in front of a high-traffic PostgreSQL cluster at a fintech company processing millions of sessions per hour. During a routine scale-out event, you discover that adding a single cache node causes a thundering herd of 40% cache-miss spikes because the naive modulo-N hash reassigns nearly every key. You need to implement a consistent hash ring with virtual nodes so that topology changes — whether a node joins during peak traffic or fails at 3 AM — affect only the minimum number of keys, roughly 1/N.
alt_scenarios:
  - "**Distributed object storage:** A media platform shards video chunks across storage nodes and needs minimal re-balancing when a node is decommissioned for maintenance."
  - "**Message queue partitioning:** A Kafka-like broker assigns producer keys to partition leaders and must reroute as few producers as possible when a broker is replaced."
  - "**Microservice routing:** An API gateway distributes sticky-session traffic across backend pods and needs to preserve session affinity as the pod count scales up or down."
constraints:
- Use virtual nodes (configurable count per physical node) for even distribution.
- get_node(key) must return a consistent result given the same ring state.
- add_node / remove_node should only reassign keys proportional to 1/N of total keys.
- You may use hashlib (e.g., MD5 or SHA-1) for hashing.
- The ring must handle the edge case of zero nodes gracefully (raise or return None).
- Keys and node IDs are strings.
examples:
- input: |-
    ring = ConsistentHashRing(num_virtual_nodes=150)
    ring.add_node('cache-1')
    ring.add_node('cache-2')
    ring.add_node('cache-3')
    print(ring.get_node('user:1001'))
    print(ring.get_node('user:1002'))
  output: |-
    'cache-2'  (or whichever node owns that hash position)
    'cache-1'  (keys are distributed roughly evenly across the three nodes)
- input: |-
    # Continuing from above
    ring.remove_node('cache-2')
    print(ring.get_node('user:1001'))
  output: '''cache-3''  — only keys previously assigned to cache-2 are reassigned; keys on cache-1 and cache-3 stay put.'
- input: |-
    ring = ConsistentHashRing(num_virtual_nodes=150)
    ring.add_node('A')
    ring.add_node('B')
    keys = [f'key-{i}' for i in range(1000)]
    before = {k: ring.get_node(k) for k in keys}
    ring.add_node('C')
    after = {k: ring.get_node(k) for k in keys}
    moved = sum(1 for k in keys if before[k] != after[k])
    print(f'{moved} keys moved out of 1000')
  output: Approximately 333 keys moved (≈1/3), demonstrating minimal reassignment.
