class_name: ConsistentHashRing
explanation: |-
  This problem is mainly about choosing a clean invariant around **hash functions** and then preserving it on every operation.

  A strong solution starts by deciding what state to keep in memory, how each public operation updates that state, and what the time complexity should be in the common case.

  The usual tradeoff here is how **sorted structure / binary search** supports the fast path without making updates or edge cases harder to reason about.

  When studying it, write down the data structure layout first, then walk through the smallest tricky example by hand: duplicate updates, missing keys, empty input, or a boundary timestamp/index.

  A polished interview answer should also call out complexity, edge cases, and the invariant that proves the implementation stays correct after each step.
references:
- Write down the shared state and the blocking conditions before choosing locks or queues.
- Test mentally for races, starvation, and forgotten wakeups.
- After implementing Consistent Hash Ring, re-run the provided hardcoded tests and explain why each one protects an important invariant.
