function_name: spiral_order
explanation: |-
  Boundary-shrinking approach: maintain four pointers — top, bottom, left, right. Collect one layer at a time:
  1. Traverse top row left to right; increment top
  2. Traverse right column top to bottom; decrement right
  3. If top <= bottom: traverse bottom row right to left; decrement bottom
  4. If left <= right: traverse left column bottom to top; increment left

  Repeat until top > bottom or left > right.

  The guard conditions in steps 3 and 4 prevent double-counting the last row or column when the remaining region is a single row or column.

  Time O(m*n), space O(1) excluding the output list.

  Alternative: use a direction array [(0,1),(1,0),(0,-1),(-1,0)] and rotate when hitting a wall — more elegant but same complexity.
references:
- Shrinking boundaries is easier to debug than the direction-rotation approach — pick whichever you can reliably implement.
- Guard the inner two traversals to handle the case where only a single row or column remains.
