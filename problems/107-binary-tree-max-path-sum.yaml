function_name: max_path_sum
explanation: |-
  Use a DFS helper that returns the maximum gain achievable going through a node in a single direction (either left or right, not both — because a caller can only extend one branch).

  Inside the helper, compute left_gain = max(0, dfs(node.left)) and right_gain = max(0, dfs(node.right)). Clamping negative gains to 0 means we never extend into a subtree that would hurt.

  The path through node = node.val + left_gain + right_gain. Update a global maximum with this value.

  Return node.val + max(left_gain, right_gain) to the caller — only one direction can be extended upward.

  The global max update and the return value serve different purposes: one records the best complete path found, the other feeds the parent's decision.

  Time O(n), space O(h).
references:
- The key insight is the split between what you return (one direction) and what you record globally (through both directions).
- Clamping to max(0, gain) elegantly handles negative subtrees without special cases.
