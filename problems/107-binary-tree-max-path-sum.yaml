id: 107
title: Binary Tree Maximum Path Sum
category: trees
difficulty: Hard
summary: Find the maximum sum of any path through the binary tree.
description: Given a binary tree where nodes can have negative values, find the maximum sum of any path. A path is a sequence of nodes where each pair of adjacent nodes has an edge. The path does not need to pass through the root, and must contain at least one node.
scenario: |-
  You're an engineer on Uber's surge-pricing infrastructure team, where city zones are modeled as a binary tree of revenue multipliers — some zones contribute positive margin, others incur negative overhead from driver incentives. The pricing optimizer needs to find the contiguous path through the zone tree that maximizes total margin contribution; the path can start and end at any two zones, not just at the root, because city geography doesn't constrain it. This runs every 30 seconds across hundreds of metro models, so a brute-force O(n²) scan is out of the question.
alt_scenarios:
  - "**Chip power analysis:** An EDA tool models a processor's power domains as a binary tree and finds the sub-path of domains with maximum combined performance gain for thermal optimization."
  - "**Financial portfolio tree:** A risk engine models correlated asset groups as a tree and finds the highest-return path of holdings to identify the strongest concentration risk."
  - "**Game map scoring:** A procedural map generator assigns value weights to regions arranged in a binary tree and finds the highest-scoring corridor to place a treasure trail."
constraints:
- The path must contain at least one node
- The path does not need to pass through the root
- Node values can be negative
- A path goes down-left, down-right, or through a node connecting both subtrees
examples:
- input: 'max_path_sum([1,2,3])'
  output: '6  # 2+1+3'
- input: 'max_path_sum([-10,9,20,null,null,15,7])'
  output: '42  # 15+20+7'
starter_code: |-
  from typing import Optional

  class TreeNode:
      def __init__(self, val=0, left=None, right=None):
          self.val = val
          self.left = left
          self.right = right

  def max_path_sum(root: Optional[TreeNode]) -> int:
      pass
follow_ups:
- Return the actual path (list of node values), not just the sum.
- Find the maximum path sum where the path must pass through the root.
- Solve for a graph instead of a tree (then it becomes harder — why?).
key_skills:
- binary tree
- DFS
- post-order traversal
- global state update
test_type: function
test_cases:
- label: simple three nodes
  setup_code: |-
    class TreeNode:
        def __init__(self, val=0, left=None, right=None):
            self.val = val; self.left = left; self.right = right
    def _make(vals):
        if not vals: return None
        nodes = [TreeNode(v) if v is not None else None for v in vals]
        kids = iter(nodes[1:])
        for node in nodes:
            if node:
                node.left = next(kids, None)
                node.right = next(kids, None)
        return nodes[0]
    def _test(vals):
        return max_path_sum(_make(vals))
  function_name: _test
  args:
  - - 1
    - 2
    - 3
  expected: 6
