id: 90
title: "collections.deque"
category: syntax
difficulty: Easy
summary: Use collections.deque to rotate a list right by k positions, handling negative and oversized k.
description: >-
  Implement `rotate_list(lst: list, k: int) -> list` that takes a list and an integer k
  and returns a new list rotated right by k positions. Use collections.deque. k may be
  larger than len(lst); k may also be negative for left rotation.
scenario: >-
  A round-robin scheduler cycles through worker slots by rotating the task queue
  by the number of slots processed each tick.
constraints:
  - lst may be empty
  - k may be any integer (positive, negative, or zero)
  - The original list must not be modified
examples:
  - input: rotate_list([1,2,3,4,5], 2)
    output: '[4, 5, 1, 2, 3]'
starter_code: |-
  def rotate_list(lst: list, k: int) -> list:
      pass
follow_ups:
  - How would you implement rotation without deque (pure slicing)?
  - What is the time complexity of deque.rotate(k)?
key_skills:
  - deque
  - rotate
  - collections
  - modular arithmetic
test_type: function
function_name: rotate_list
test_cases:
  - label: rotate right by 2
    input:
      lst: [1, 2, 3, 4, 5]
      k: 2
    expected: [4, 5, 1, 2, 3]
  - label: rotate right by 1
    input:
      lst: [1, 2, 3]
      k: 1
    expected: [3, 1, 2]
  - label: negative k left rotation
    input:
      lst: [1, 2, 3, 4]
      k: -1
    expected: [2, 3, 4, 1]
  - label: k equals length full rotation
    input:
      lst: [1, 2, 3]
      k: 6
    expected: [1, 2, 3]
explanation: |-
  `deque.rotate(k)` rotates right by k in O(k) time. A positive k moves the rightmost
  elements to the front; negative k moves leftmost to the back. deque is designed for
  O(1) appends and pops from both ends, making it ideal for queue, sliding window, and
  rotation operations. Convert back with `list(d)`.
references:
  - "Python docs: collections.deque — https://docs.python.org/3/library/collections.html#collections.deque"
  - "deque.rotate() — https://docs.python.org/3/library/collections.html#collections.deque.rotate"
