id: 76
title: Rotate Right
category: warmup
difficulty: Easy
summary: Rotate an array to the right by k steps.
description: Implement rotate_right(nums, k) that returns a new list rotated right by k positions.
scenario: A short indexing warm-up gets you thinking about modular arithmetic without much code overhead.
constraints:
- Return a new list.
- k may be larger than the array length.
examples:
- input: rotate_right([1,2,3,4,5], 2)
  output: '[4,5,1,2,3]'
starter_code: |-
  def rotate_right(nums: list[int], k: int) -> list[int]:
      pass
follow_ups:
- Rotate in place.
- Support left rotation too.
key_skills:
- arrays
test_type: function
function_name: rotate_right
test_cases:
- label: basic
  input:
    nums:
    - 1
    - 2
    - 3
    - 4
    - 5
    k: 2
  expected:
  - 4
  - 5
  - 1
  - 2
  - 3
- label: k larger than length
  input:
    nums:
    - 1
    - 2
    - 3
    k: 4
  expected:
  - 3
  - 1
  - 2
- label: empty
  input:
    nums: []
    k: 3
  expected: []
explanation: |-
  This warm-up is meant to build confidence around **arrays** with a very small surface area.

  A good answer should still name the invariant or main idea clearly, handle the obvious edge cases, and keep the implementation easy to read.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
- 'Review the most common array patterns: one pass, two pointers, prefix accumulation, and counting.'
- 'Treat Rotate Right as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
