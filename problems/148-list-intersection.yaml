id: 148
title: List Intersection
category: warmup
difficulty: Easy
summary: Return the sorted intersection of two lists.
description: Implement intersection(a, b) that returns a sorted list of elements that appear in both a and b. Each element should appear only once in the result.
scenario: |-
  A feature-flag service is computing the set of flags that are enabled for both a user's organization and their individual account. Only flags present in both lists are active. The result is sorted alphabetically to produce a deterministic response for the client cache key.
alt_scenarios:
  - "**Friend recommendations:** A social platform finds users that two people mutually follow as a first step in its recommendation pipeline."
  - "**Skill matching:** A hiring platform returns skills listed on both a job posting and a candidate's profile to highlight the strongest matches."
constraints:
  - Elements in each input list are unique. Return a sorted list.
examples:
  - input: intersection([1, 2, 3, 4], [3, 4, 5, 6])
    output: '[3, 4]'
starter_code: |-
  def intersection(a: list, b: list) -> list:
      pass
follow_ups:
  - Handle duplicates in the inputs (multiset intersection).
  - Return the union instead, then the symmetric difference.
key_skills:
  - sets
  - arrays
test_type: function
function_name: intersection
test_cases:
  - label: basic
    input:
      a: [1, 2, 3, 4]
      b: [3, 4, 5, 6]
    expected: [3, 4]
  - label: no overlap
    input:
      a: [1, 2]
      b: [3, 4]
    expected: []
  - label: one subset of other
    input:
      a: [1, 2, 3]
      b: [2, 3]
    expected: [2, 3]
  - label: identical
    input:
      a: [5, 1, 3]
      b: [3, 5, 1]
    expected: [1, 3, 5]
explanation: |-
  This warm-up is meant to build confidence around **sets** with a very small surface area.

  Convert both lists to sets, compute the set intersection with &, then sort the result. This is O(n + m) and reads clearly.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
  - 'sorted(set(a) & set(b)) is the idiomatic one-liner.'
  - 'Treat List Intersection as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
