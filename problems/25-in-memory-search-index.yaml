          pass

      def search(self, query: str) -> list[int]:
          pass
follow_ups:
- Add TF-IDF scoring.
- Support phrase queries where words must appear adjacent.
- Add incremental index updates without rebuilding.
key_skills:
- inverted index
- tokenization
- hash map
- sorting by score
