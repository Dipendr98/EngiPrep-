explanation: |-
  Core state: a 3x3 board (None/'X'/'O'), current player, and a game-over flag.

  make_move logic:
  1. Raise ValueError if game is over or cell is occupied.
  2. Place the mark, then check for a win: scan all rows, columns, and both diagonals for three identical non-None values.
  3. If win: set over=True, return '{player} wins'.
  4. If board full with no winner: return 'draw'.
  5. Else: switch player, return 'continue'.

  Win check can be written as a helper that checks all 8 lines. For an n×n generalization, use the same pattern but iterate over length-n slices.

  Avoid bugs: check win before checking draw (a filled board with a win is a win, not a draw).
references:
- Check win condition before checking draw — a board-full move can simultaneously be a winning move.
- A clean helper like _check_winner(player) that scans all 8 lines keeps make_move readable.
