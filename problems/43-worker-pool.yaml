id: 43
title: Worker Pool
category: concurrency
difficulty: Hard
summary: Fixed-size pool of workers that process submitted tasks concurrently.
description: Implement a worker pool with N worker threads/coroutines. submit(task) queues a task and returns a future. Tasks are executed by available workers in FIFO order. Support shutdown(wait=True) which waits for pending tasks to complete and shutdown(wait=False) which cancels pending tasks.
scenario: 'You''re building the background-job engine for an internal platform. API handlers need to kick off CPU-bound work — image resizing, PDF generation, report compilation — without blocking the request. You want a fixed pool of worker threads that drains a shared task queue. Each submission hands back a future so the caller can check on the result later. When the service receives SIGTERM, you need a clean shutdown path: either finish in-flight work or drop what''s pending and exit fast.'
constraints:
- num_workers is set at construction and stays fixed.
- submit(task) accepts a zero-argument callable and returns a Future object.
- Future must support .result(timeout=None) that blocks until the value is ready or raises the task's exception.
- Tasks execute in FIFO submission order.
- shutdown(wait=True) blocks until all submitted tasks complete; shutdown(wait=False) cancels pending tasks but lets running tasks finish.
- submit() after shutdown() should raise RuntimeError.
examples:
- input: |-
    pool = WorkerPool(num_workers=3)
    future1 = pool.submit(lambda: 2 + 2)
    future2 = pool.submit(lambda: 'hello'.upper())
    print(future1.result())  # blocks until done
    print(future2.result())
    pool.shutdown(wait=True)
  output: |-
    4
    'HELLO'
    All workers finish and join cleanly.
- input: |-
    pool = WorkerPool(num_workers=2)
    import time
    futures = [pool.submit(lambda i=i: (time.sleep(0.1), i)[1]) for i in range(5)]
    pool.shutdown(wait=False)
  output: Tasks already picked up by workers finish, but remaining queued tasks are discarded. Futures for discarded tasks raise CancelledError on .result().
- input: |-
    pool = WorkerPool(num_workers=2)
    def failing_task():
        raise ValueError('bad input')
    f = pool.submit(failing_task)
    try:
        f.result()
    except ValueError as e:
        print(e)
  output: '''bad input'' — the exception propagates through the future without crashing the worker.'
starter_code: |
  import threading
  from typing import Any, Callable

  class Future:
      def __init__(self):
          pass

      def result(self, timeout=None) -> Any:
          """Block until the result is available, then return it (or raise)."""
          pass

      def done(self) -> bool:
          """Return True if the task has completed (success or failure)."""
          pass

  class WorkerPool:
      def __init__(self, num_workers: int):
          pass

      def submit(self, task: Callable[[], Any]) -> Future:
          """Submit a task and return a Future."""
          pass

      def shutdown(self, wait: bool = True) -> None:
          """Shut down the pool."""
          pass
