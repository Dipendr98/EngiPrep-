id: 19
title: Job Queue with Retries
category: scheduling
difficulty: Hard
summary: Priority job queue with retry logic, backoff, and dead letter handling.
description: Implement a job queue where jobs have priorities and can fail. Failed jobs are retried with exponential backoff (1s, 2s, 4s, ...) up to max_retries. Jobs exceeding max_retries go to a dead letter queue. Support enqueue(job, priority), process_next() which returns the highest-priority ready job, and get_dead_letters().
scenario: ''
constraints: []
examples: []
