          pass

      def process_next(self, success: bool = True):
          pass

      def advance_time(self, seconds: int) -> None:
          pass

      def get_dead_letters(self) -> list[str]:
          pass
follow_ups:
- Add job dependencies so a job only becomes ready when its dependencies complete.
- Add a cancel(job_id) operation.
- How would you persist this across restarts?
