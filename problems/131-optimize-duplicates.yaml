function_name: remove_duplicates
explanation: |-
  The fix: replace the `seen` list with a `seen` set. The `in` operator is O(1) for sets vs O(n) for lists.

  ```python
  def remove_duplicates(items):
      seen = set()
      result = []
      for item in items:
          if item not in seen:
              seen.add(item)
              result.append(item)
      return result
  ```

  Python 3.7+ alternative: `list(dict.fromkeys(items))` — dicts preserve insertion order and ignore duplicate keys.

  Why this matters in interviews:
  - `x in list` is O(n) — list scan
  - `x in set` is O(1) average — hash lookup
  - The overall complexity drops from O(n²) to O(n)

  Space tradeoff: we now use O(n) extra space for the set, but that's acceptable when the alternative is O(n²) time.

  When to use the dict trick: it's the most Pythonic one-liner, but requires all items to be hashable and doesn't generalize. The set approach is more explicit and easier to adapt.
references:
- 'Every time you see ''if x in list'', ask: can this list be a set? Usually yes.'
- dict.fromkeys(items) is the idiomatic Python one-liner for order-preserving deduplication.
