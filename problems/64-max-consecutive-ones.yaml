id: 64
title: Max Consecutive Ones
category: warmup
difficulty: Easy
summary: Find the longest streak of 1 values.
description: Implement max_consecutive_ones(nums) that returns the maximum number of consecutive 1s in the input array.
scenario: |-
  The reliability team at a cloud provider is auditing the uptime history of a fleet of servers, represented as a binary time-series array where 1 means the server was healthy and 0 means it was down during that interval. To identify which server had the longest uninterrupted healthy run, the system needs to scan each server's history and return the length of the longest consecutive streak of 1s. The check runs over thousands of server histories, so it must complete in a single pass with O(1) extra space.
alt_scenarios:
  - "**Network packet analysis:** A network monitor scans a binary sequence of received/dropped packets to find the longest clean transmission window for SLA reporting."
  - "**Genome sequencing:** A bioinformatics pipeline scans a binary-encoded quality mask over a sequencing read to find the longest high-confidence region suitable for variant calling."
constraints:
- The array contains only 0 and 1.
examples:
- input: max_consecutive_ones([1,1,0,1,1,1])
  output: '3'
starter_code: |-
  def max_consecutive_ones(nums: list[int]) -> int:
      pass
follow_ups:
- Allow flipping at most one 0.
- Return the start and end index of the best run.
key_skills:
- arrays
- counting
test_type: function
function_name: max_consecutive_ones
test_cases:
- label: basic
  input:
    nums:
    - 1
    - 1
    - 0
    - 1
    - 1
    - 1
  expected: 3
- label: all zeros
  input:
    nums:
    - 0
    - 0
    - 0
  expected: 0
- label: all ones
  input:
    nums:
    - 1
    - 1
    - 1
  expected: 3
explanation: |-
  This warm-up is meant to build confidence around **arrays** with a very small surface area.

  A good answer should still name the invariant or main idea clearly, handle the obvious edge cases, and keep the implementation easy to read.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
- 'Review the most common array patterns: one pass, two pointers, prefix accumulation, and counting.'
- Counting problems usually become easier once you decide what each counter means.
- 'Treat Max Consecutive Ones as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
