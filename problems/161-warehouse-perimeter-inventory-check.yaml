  input:
    warehouse:
    - - 1
      - 2
      - 3
    - - 4
      - 5
      - 6
    - - 7
      - 8
      - 9
  expected: 40
- label: 2x2 all perimeter
  input:
    warehouse:
    - - 10
      - 20
    - - 30
      - 40
  expected: 100
- label: single element
  input:
    warehouse:
    - - 5
  expected: 5
- label: empty warehouse
  input:
    warehouse: []
  expected: 0
- label: single row
  input:
    warehouse:
    - - 3
      - 7
      - 2
      - 5
  expected: 17
- label: larger 4x5 matrix
