      - 11
      - 12
      - 13
      - 14
  expected: 105
explanation: 'The optimal approach iterates through each cell of the matrix and checks
  if it lies on the perimeter (i.e., the cell is in the first or last row, or in the
  first or last column). If so, add its value to a running sum. This runs in O(m*n)
  time where m and n are the dimensions. An optimization is to only iterate over the
  first row, last row, and the middle rows'' first and last elements, avoiding unnecessary
  checks on interior cells. Special care is needed for edge cases: empty matrix, single
  row, single column, and 1x1 matrix.'
references:
- 2D array traversal
- Matrix boundary conditions
- Edge case handling in grids
