id: 109
title: Longest Increasing Subsequence
category: dynamic programming
difficulty: Medium
summary: Find the length of the longest strictly increasing subsequence.
description: Given an array of integers, return the length of the longest strictly increasing subsequence (LIS). A subsequence is a sequence derived by deleting some or no elements without changing the order of the remaining elements.
scenario: |-
  You're a performance engineer at Shopify working on the storefront build pipeline, where each deploy records its total bundle size in kilobytes. Product managers want to know the longest uninterrupted streak of deploys where the bundle strictly grew — signaling a sustained period of code bloat that wasn't caught by individual PR reviews. Occasional size-reducing refactors should not break the streak count; only strictly increasing consecutive sizes (in the original deployment order) matter.
alt_scenarios:
  - "**Stock trading signal:** A quant team identifies the longest sequence of strictly increasing closing prices in a ticker's history to detect a sustained bull run without resampling the data."
  - "**Telemetry anomaly detection:** An SRE team finds the longest stretch of API response times that increased monotonically, flagging a slow memory leak that worsens with each new request."
  - "**Game leaderboard analysis:** A gaming platform finds the longest run of match scores where a player improved strictly each game, to award a 'hot streak' badge."
constraints:
- Elements of the subsequence must be strictly increasing (no equal elements)
- Subsequence does not need to be contiguous
- Empty array returns 0
examples:
- input: 'lis([10,9,2,5,3,7,101,18])'
  output: '4  # [2,3,7,101] or [2,5,7,101]'
- input: 'lis([0,1,0,3,2,3])'
  output: '4  # [0,1,2,3]'
- input: 'lis([7,7,7,7,7])'
  output: '1'
starter_code: |-
  def lis(nums: list[int]) -> int:
      pass
follow_ups:
- Return one of the actual subsequences, not just its length.
- Solve in O(n log n) using binary search (patience sorting).
- Find the longest non-decreasing subsequence (allow equal elements).
key_skills:
- dynamic programming
- binary search optimization
- subsequence
test_type: function
test_cases:
