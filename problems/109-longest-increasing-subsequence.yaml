function_name: lis
explanation: |-
  O(n²) DP approach: dp[i] = length of LIS ending at index i. Initialize all dp[i] = 1. For each i, look back at all j < i where nums[j] < nums[i], and dp[i] = max(dp[i], dp[j] + 1). Answer is max(dp).

  O(n log n) approach (patience sorting): maintain a tails array. For each number, binary search for the first tail >= num and replace it (or append if num is larger than all tails). The length of tails is the answer. This works because tails is always sorted.

  Common mistake in the O(n²) version: forgetting to track the global max (the LIS might not end at the last element).

  Time O(n²) for DP, O(n log n) with binary search. Space O(n) either way.
references:
- Start with the O(n²) DP to get the right answer, then optimize to O(n log n) with bisect.bisect_left.
- The patience sorting intuition: each pile represents a candidate tail for a subsequence of that length.
