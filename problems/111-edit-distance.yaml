id: 111
title: Edit Distance (Levenshtein)
category: dynamic programming
difficulty: Medium
summary: Find the minimum number of edits to transform one string into another.
description: Given two strings word1 and word2, return the minimum number of single-character operations (insert, delete, or replace) needed to transform word1 into word2.
scenario: |-
  You're a search infrastructure engineer at Elastic building the typo-tolerance layer for Elasticsearch's query analyzer. When a user searches for "Kuberntes deployemnt," the engine must compute the edit distance between the misspelled tokens and every indexed term before ranking candidates — a simple exact-match lookup would return zero results. The distance threshold (typically 1–2 edits) must be evaluated across an index of millions of unique terms, so the DP computation needs to be tightly optimized and early-terminated when the running distance already exceeds the threshold.
alt_scenarios:
  - "**DNA sequence alignment:** A bioinformatics pipeline computes edit distance between a query read and reference genome segments to identify the most likely alignment position."
  - "**Spell-checker backend:** A Google Docs–style autocorrect service ranks correction candidates by edit distance from the misspelled word before presenting suggestions to the user."
  - "**Plagiarism detector:** An academic integrity tool measures the minimum edit distance between submitted essay paragraphs and a corpus of known sources to flag near-verbatim copies."
constraints:
- Three allowed operations on word1: insert a character, delete a character, replace a character
- Each operation counts as 1 edit
- Empty string input is valid (editing to/from empty string)
examples:
- input: 'edit_distance("horse", "ros")'
  output: '3'
- input: 'edit_distance("intention", "execution")'
  output: '5'
- input: 'edit_distance("", "abc")'
  output: '3'
starter_code: |-
  def edit_distance(word1: str, word2: str) -> int:
      pass
follow_ups:
- Return the actual sequence of operations needed, not just the count.
- Compute similarity ratio (1 - edit_distance / max_len) for ranking.
- Speed up with early termination if distance exceeds a threshold.
key_skills:
- dynamic programming
- 2D DP table
- string comparison
test_type: function
test_cases:
- label: horse to ros
  args:
  - horse
  - ros
  expected: 3
- label: intention to execution
  args:
  - intention
  - execution
  expected: 5
- label: empty to word
  args:
  - ''
  - abc
  expected: 3
- label: same strings
  args:
  - kitten
  - kitten
  expected: 0
- label: one character diff
  args:
  - cat
  - cut
  expected: 1
function_name: edit_distance
explanation: |-
  Build a 2D dp table where dp[i][j] = edit distance between word1[:i] and word2[:j].

  Base cases: dp[0][j] = j (insert j chars from empty), dp[i][0] = i (delete i chars to reach empty).

  Recurrence:
  - If word1[i-1] == word2[j-1]: dp[i][j] = dp[i-1][j-1] (no cost — characters match)
  - Else: dp[i][j] = 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])
    - dp[i-1][j]: delete from word1
    - dp[i][j-1]: insert into word1
    - dp[i-1][j-1]: replace

  Answer: dp[len(word1)][len(word2)]

  Time O(m*n), space O(m*n). Can optimize to O(min(m,n)) with two rows.
references:
- Write out a small example (e.g., "ab" vs "bc") and fill the table by hand before coding.
- The three predecessors in the recurrence map exactly to delete, insert, replace — keep that mapping clear.
