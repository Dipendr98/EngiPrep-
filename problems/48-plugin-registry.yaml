id: 48
title: Plugin Registry
category: api_design
difficulty: Medium
summary: Extensible plugin system with registration, discovery, and lifecycle hooks.
description: 'Implement a plugin registry. register(name, plugin) registers a plugin object. Plugins must implement an initialize() and shutdown() method. get(name) retrieves a plugin. Support dependency ordering: plugins can declare dependencies on other plugins, and initialize() must be called in dependency order.'
scenario: |-
  The platform engineering team at a B2B SaaS company is building a self-service extension system so that product squads can ship optional capabilities — a metrics-exporter plugin, an SSO plugin that depends on the auth-core plugin, a reporting plugin that depends on both — without modifying the main application binary. You need a plugin registry that accepts registrations at startup, resolves the dependency graph using a topological sort, and calls each plugin's initialize() in safe dependency order so that no plugin starts before its dependencies are live. On graceful shutdown the order reverses, and any circular or missing dependency must be caught before any plugin touches production state.
alt_scenarios:
  - "**Game engine modules:** A game studio's engine loads renderer, physics, and audio subsystems in dependency order at scene start and tears them down cleanly on exit."
  - "**CI/CD pipeline steps:** A build system resolves step dependencies across lint, test, compile, and publish stages and refuses to start if the dependency graph contains a cycle."
  - "**Kubernetes operator controllers:** A multi-controller operator initializes custom resource controllers in an order that satisfies inter-controller dependencies declared in their specs."
constraints:
- Each plugin object must have a 'dependencies' attribute (list of plugin name strings), and initialize() and shutdown() methods.
- register(name, plugin) raises if name is already registered.
- get(name) returns the plugin or raises KeyError.
- initialize_all() calls initialize() in topological (dependency) order.
- shutdown_all() calls shutdown() in reverse dependency order.
- Circular dependencies must be detected and raise an error.
examples:
- input: |-
    class DBPlugin:
        dependencies = []
        def initialize(self): print('DB started')
        def shutdown(self): print('DB stopped')

    class AuthPlugin:
        dependencies = ['database']
        def initialize(self): print('Auth started')
        def shutdown(self): print('Auth stopped')

    reg = PluginRegistry()
    reg.register('database', DBPlugin())
    reg.register('auth', AuthPlugin())
    reg.initialize_all()
  output: |-
    DB started
    Auth started
    (database is initialized before auth because auth depends on it)
- input: reg.shutdown_all()
  output: |-
    Auth stopped
    DB stopped
    (reverse dependency order)
- input: |-
    class BadPlugin:
        dependencies = ['nonexistent']
        def initialize(self): pass
        def shutdown(self): pass

    reg.register('bad', BadPlugin())
    reg.initialize_all()
  output: 'Raises DependencyError: "Plugin ''bad'' depends on ''nonexistent'' which is not registered."'
starter_code: |
  from typing import Any

  class PluginRegistry:
      def __init__(self):
          pass

      def register(self, name: str, plugin: Any) -> None:
          """Register a plugin by name."""
          pass

      def get(self, name: str) -> Any:
          """Retrieve a registered plugin."""
          pass

      def initialize_all(self) -> None:
          """Initialize all plugins in dependency order."""
          pass

      def shutdown_all(self) -> None:
          """Shut down all plugins in reverse dependency order."""
          pass
follow_ups:
- Add plugin versioning and compatibility checking.
- 'Support hot-reloading: replace a plugin at runtime.'
- Add hook points where plugins can extend core behavior.
key_skills:
- registry pattern
- dependency resolution
- topological sort
- lifecycle management
test_type: class
