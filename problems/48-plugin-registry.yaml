id: 48
title: Plugin Registry
category: api_design
difficulty: Medium
summary: Extensible plugin system with registration, discovery, and lifecycle hooks.
description: 'Implement a plugin registry. register(name, plugin) registers a plugin object. Plugins must implement an initialize() and shutdown() method. get(name) retrieves a plugin. Support dependency ordering: plugins can declare dependencies on other plugins, and initialize() must be called in dependency order.'
scenario: You're architecting a modular analytics platform where teams ship features as plugins — a 'database' plugin, an 'auth' plugin that depends on 'database', a 'dashboard' plugin that depends on both. The registry needs to accept plugin registrations, resolve the dependency graph, and call initialize() in the right order so that by the time 'auth' starts up, 'database' is already live. On shutdown, the order reverses. If someone registers a plugin with a missing or circular dependency, you should fail fast with a clear error.
constraints:
- Each plugin object must have a 'dependencies' attribute (list of plugin name strings), and initialize() and shutdown() methods.
- register(name, plugin) raises if name is already registered.
- get(name) returns the plugin or raises KeyError.
- initialize_all() calls initialize() in topological (dependency) order.
- shutdown_all() calls shutdown() in reverse dependency order.
- Circular dependencies must be detected and raise an error.
examples:
- input: |-
    class DBPlugin:
        dependencies = []
        def initialize(self): print('DB started')
        def shutdown(self): print('DB stopped')

    class AuthPlugin:
        dependencies = ['database']
        def initialize(self): print('Auth started')
        def shutdown(self): print('Auth stopped')

    reg = PluginRegistry()
    reg.register('database', DBPlugin())
    reg.register('auth', AuthPlugin())
    reg.initialize_all()
  output: |-
    DB started
    Auth started
    (database is initialized before auth because auth depends on it)
- input: reg.shutdown_all()
  output: |-
    Auth stopped
    DB stopped
    (reverse dependency order)
- input: |-
    class BadPlugin:
        dependencies = ['nonexistent']
        def initialize(self): pass
        def shutdown(self): pass

    reg.register('bad', BadPlugin())
    reg.initialize_all()
  output: 'Raises DependencyError: "Plugin ''bad'' depends on ''nonexistent'' which is not registered."'
starter_code: |
  from typing import Any

  class PluginRegistry:
      def __init__(self):
          pass

      def register(self, name: str, plugin: Any) -> None:
          """Register a plugin by name."""
          pass

      def get(self, name: str) -> Any:
          """Retrieve a registered plugin."""
          pass

      def initialize_all(self) -> None:
          """Initialize all plugins in dependency order."""
          pass

      def shutdown_all(self) -> None:
          """Shut down all plugins in reverse dependency order."""
          pass
