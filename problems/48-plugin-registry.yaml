        def initialize(self):
            logs.append('db:init')
        def shutdown(self):
            logs.append('db:down')

    class AuthPlugin:
        dependencies = ['database']
        def initialize(self):
            logs.append('auth:init')
        def shutdown(self):
            logs.append('auth:down')

    db_plugin = DBPlugin()
    auth_plugin = AuthPlugin()
