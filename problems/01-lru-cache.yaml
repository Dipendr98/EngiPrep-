id: 1
title: LRU Cache
category: stateful
difficulty: Hard
summary: Build a cache that evicts the least recently used entry when full.
description: Design and implement a Least Recently Used cache. It should support get(key) which returns the value or -1 if not found, and put(key, value) which inserts or updates. When capacity is exceeded, evict the least recently used item. Both operations must be O(1).
scenario: |-
  The Feeds team at a social platform stores user profile metadata in PostgreSQL, but every feed render triggers dozens of profile lookups that each cost ~50ms round-trip. You've been asked to add an in-process LRU cache in the API server to absorb repeated reads for hot profiles. The cache must fit in a fixed 512 MB heap budget, evict the coldest entry the moment it's full, and keep both reads and writes at O(1) so it doesn't become the bottleneck itself.
alt_scenarios:
  - "**DNS resolver:** A recursive resolver caches recently answered records in a bounded LRU table to avoid re-querying upstream nameservers on every request."
  - "**Browser engine:** A rendering engine keeps a fixed-size LRU cache of decoded image bitmaps so repeatedly visited assets don't require re-decoding from disk."
  - "**ML feature store:** An online inference server caches the most recently computed user embeddings in an LRU store to avoid redundant model forward passes between requests."
constraints:
- Keys and values are integers
- Capacity is always a positive integer
- Both get and put must run in O(1) average time
- get returns -1 for a key not in the cache
examples:
- input: |-
    cache = LRUCache(2)
    cache.put(1, 10)
    cache.put(2, 20)
    cache.get(1)
    cache.put(3, 30)
    cache.get(2)
  output: |-
    None
    None
    10    # key 1 exists, now most-recently used
    None  # cache full – evicts key 2 (LRU) to make room
    -1    # key 2 was evicted
- input: |-
    cache = LRUCache(2)
    cache.put(1, 10)
    cache.put(1, 99)
    cache.get(1)
  output: |-
    None
    None  # updates key 1 in place, counts as a use
    99    # returns updated value
- input: |-
    cache = LRUCache(1)
    cache.put(1, 10)
    cache.put(2, 20)
    cache.get(1)
    cache.get(2)
  output: |-
    None
    None  # capacity 1 – evicts key 1 immediately
    -1    # key 1 was evicted
    20
starter_code: |-
  class LRUCache:
      def __init__(self, capacity: int):
          pass

      def get(self, key: int) -> int:
          pass

      def put(self, key: int, value: int) -> None:
          pass
follow_ups:
- Add TTL-based expiration so entries auto-expire after a configurable duration.
- Make it thread-safe for concurrent readers and writers.
- Add an eviction callback that fires when an item is removed.
key_skills:
- hash map
- doubly linked list
- O(1) design
- eviction policy
