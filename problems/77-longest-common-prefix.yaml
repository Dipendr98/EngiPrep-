id: 77
title: Longest Common Prefix
category: warmup
difficulty: Easy
summary: Find the shared prefix across a list of strings.
description: Implement longest_common_prefix(words) that returns the longest shared starting substring across all words.
scenario: |-
  A cloud storage team at a SaaS company is building a prefix-based namespace resolver for their object store. Given a list of object keys that are supposed to share a common path prefix, the resolver must compute the longest shared prefix to determine the bucket namespace at ingestion time. If the keys diverge unexpectedly, the empty-string result triggers an alert and routes the objects to a quarantine bucket for manual review.
alt_scenarios:
  - "**CLI tab-completion:** A shell autocomplete engine finds the longest common prefix across all matching command candidates to fill in the shared portion automatically."
  - "**Trie optimization:** A search index builder computes the longest common prefix of sibling nodes to collapse redundant trie edges before serializing to disk."
  - "**Config namespace resolver:** A Kubernetes operator extracts the common prefix of a set of ConfigMap keys to determine the shared annotation namespace."
constraints:
- If the list is empty, return an empty string.
examples:
- input: longest_common_prefix(["flower","flow","flight"])
  output: '"fl"'
starter_code: |-
  def longest_common_prefix(words: list[str]) -> str:
      pass
follow_ups:
- Ignore case.
- Support streaming additional words.
key_skills:
- strings
- arrays
test_type: function
function_name: longest_common_prefix
test_cases:
- label: common prefix
  input:
    words:
    - flower
    - flow
    - flight
  expected: fl
- label: none
  input:
    words:
    - dog
    - racecar
    - car
  expected: ''
- label: empty list
  input:
    words: []
  expected: ''
explanation: |-
  This warm-up is meant to build confidence around **strings** with a very small surface area.

  A good answer should still name the invariant or main idea clearly, handle the obvious edge cases, and keep the implementation easy to read.

  Use the hardcoded tests to sanity-check the basics quickly, then explain why your chosen approach is the simplest correct solution.
references:
- Practice a few small string transforms by hand so indexing, trimming, and reconstruction feel automatic.
- 'Review the most common array patterns: one pass, two pointers, prefix accumulation, and counting.'
- 'Treat Longest Common Prefix as a speed drill: solve it cleanly, run the tests, then restate the core idea in one sentence.'
