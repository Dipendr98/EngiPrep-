follow_ups:
- Support remove(num) to delete a previously added number.
- Extend to find any arbitrary percentile, not just the median.
- What if numbers arrive in a distributed fashion across multiple machines?
key_skills:
- two heaps (max-heap + min-heap)
- balancing invariant
- streaming
