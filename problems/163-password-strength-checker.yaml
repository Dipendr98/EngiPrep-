id: 163
title: Password Strength Checker
category: cybersecurity
difficulty: Easy
summary: Evaluate password strength based on security best practices
description: |
  Implement a function that evaluates the strength of a password based on common security criteria.
  
  Check for the following:
  - Length (minimum 8 characters for "weak", 12+ for "strong", 16+ for "very strong")
  - Contains uppercase letters
  - Contains lowercase letters
  - Contains digits
  - Contains special characters (!@#$%^&*()_+-=[]{}|;:,.<>?)
  - Does NOT contain common patterns (password, 123456, qwerty, admin, letmein)
  
  Return a dict with:
  - "score": integer 0-5 (one point per criteria met: length>=8, upper, lower, digit, special)
  - "strength": "very_weak" (0-1), "weak" (2), "medium" (3), "strong" (4), "very_strong" (5)
  - "feedback": list of suggestions for improvement
  - "has_common_pattern": boolean
scenario: |
  Your team is building a user registration system. Before accepting a password,
  you need to evaluate its strength and provide actionable feedback to help users
  create secure passwords that meet your organization's security policy.
constraints:
  - Input is always a string
  - Empty string should return score 0
  - Common pattern check is case-insensitive
  - Special characters include: !@#$%^&*()_+-=[]{}|;:,.<>?
examples:
  - input: "check_password(\"hello\")"
    output: "{\"score\": 1, \"strength\": \"very_weak\", \"has_common_pattern\": false}"
  - input: "check_password(\"MyP@ssw0rd!2024\")"
    output: "{\"score\": 5, \"strength\": \"very_strong\", \"has_common_pattern\": false}"
starter_code: |
  def check_password(password):
      pass
key_skills:
  - password security
  - input validation
  - string analysis
follow_ups:
  - How would you check against a database of breached passwords?
  - How would you estimate crack time using entropy calculations?
test_type: function
function_name: check_password
test_cases:
  - label: empty password
    input:
      password: ""
    expected:
      score: 0
      strength: "very_weak"
  - label: short simple password
    input:
      password: "hello"
    expected:
      score: 1
      strength: "very_weak"
  - label: medium password
    input:
      password: "Hello123"
    expected:
      score: 3
      strength: "medium"
  - label: strong password
    input:
      password: "MyP@ssw0rd!2024"
    expected:
      score: 5
      strength: "very_strong"
  - label: common pattern
    input:
      password: "password123"
    expected:
      has_common_pattern: true